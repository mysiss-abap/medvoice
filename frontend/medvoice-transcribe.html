<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Transcripción</title>
  <style>
    :root{
      --sap-blue:#0a6ed1; --sap-blue-2:#0854a0; --sap-bg:#f7f7f7; --sap-card:#fff;
      --sap-text:#1d2d3e; --sap-muted:#6a6d70; --sap-border:#d9d9d9;
      --ok:#107e3e; --warn:#e9730c; --err:#bb0000;
    }
    body{margin:0;background:var(--sap-bg);font-family:Segoe UI, Arial, sans-serif;color:var(--sap-text);}
    header{background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));color:#fff;padding:14px 18px;}
    header .t{font-size:18px;font-weight:600;}
    header .s{font-size:12px;opacity:.9;margin-top:2px;}
    .wrap{max-width:980px;margin:18px auto;padding:0 14px;}
    .card{background:var(--sap-card);border:1px solid var(--sap-border);border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.05);padding:16px;margin-bottom:14px;}
    .btn{
      border:1px solid var(--sap-blue); background:var(--sap-blue); color:#fff;
      border-radius:8px; padding:10px 14px; font-size:14px; cursor:pointer; transition:.15s; user-select:none;
    }
    .btn:hover{filter:brightness(.95);}
    .btn:disabled{opacity:.55;cursor:not-allowed;}
    .btn-ghost{background:#fff;color:var(--sap-blue);border-color:var(--sap-blue);}
    .btn-warn{background:var(--warn);border-color:var(--warn);}
    textarea{
      border:1px solid var(--sap-border);border-radius:8px;padding:10px 10px;font-size:14px;outline:none;background:#fff;
      width:100%;min-height:320px;resize:vertical;line-height:1.4
    }
    textarea:focus{border-color:var(--sap-blue);}
    .pill{display:inline-block;padding:5px 10px;border-radius:999px;font-size:12px;background:#eef2f7;border:1px solid var(--sap-border);color:var(--sap-muted);}
    .status{margin-top:10px;font-size:13px;}
    .ok{color:var(--ok)} .warn{color:var(--warn)} .err{color:var(--err)}
    .small{font-size:12px;color:var(--sap-muted);line-height:1.4}
    .mono{font-family:Consolas, monospace;font-size:12px;white-space:pre-wrap;max-height:170px;overflow:auto;}

  /* ==== mySiss Voice Assistant (GIF + popup sin texto) ==== */
  .mysiss-gif-btn{
    position:fixed;
    right:18px;
    bottom:18px;
    width:86px;
    height:86px;
    border-radius:26px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: 0 18px 60px rgba(0,0,0,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
    z-index:9999;
    backdrop-filter: blur(10px);
    transition: transform .12s ease;
  }
  .mysiss-gif-btn:active{ transform: scale(.98); }
  .mysiss-gif-btn img{
    width:72px;
    height:72px;
    object-fit:contain;
    border-radius:20px;
    display:block;
  }

  .mysiss-overlay{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,.55);
    display:none;
    align-items:flex-end;
    justify-content:flex-end;
    padding:18px;
    z-index:9998;
  }
  .mysiss-overlay.show{ display:flex; }

  .mysiss-modal{
    width:min(420px, 100%);
    height:min(240px, 60vh);
    border-radius:22px;
    background: rgba(12,16,28,.55);
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: 0 18px 60px rgba(0,0,0,.55);
    backdrop-filter: blur(14px);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }

  .mysiss-close{
    position:absolute;
    top:12px;
    right:12px;
    width:40px;
    height:40px;
    border-radius:14px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    cursor:pointer;
  }
  .mysiss-close::before, .mysiss-close::after{
    content:"";
    position:absolute;
    top:50%; left:50%;
    width:18px; height:2px;
    background: rgba(255,255,255,.80);
    transform-origin:center;
  }
  .mysiss-close::before{ transform: translate(-50%,-50%) rotate(45deg); }
  .mysiss-close::after{  transform: translate(-50%,-50%) rotate(-45deg); }

  .mysiss-mic-orb{
    width:120px;
    height:120px;
    border-radius:999px;
    border: 1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.06);
    cursor:pointer;
    position:relative;
    display:grid;
    place-items:center;
    overflow:hidden;
  }

  .mysiss-mic-core{
    width:24px; height:24px;
    border-radius:999px;
    background: rgba(124,58,237,.9);
    box-shadow: 0 0 0 10px rgba(124,58,237,.14);
  }

  .mysiss-mic-ring{
    position:absolute;
    inset:-30px;
    border-radius:999px;
    border: 2px solid rgba(124,58,237,.0);
    pointer-events:none;
  }

  .mysiss-listening .mysiss-mic-core{
    box-shadow: 0 0 0 14px rgba(124,58,237,.18);
    animation: mysissPulse 1.1s infinite;
  }
  .mysiss-listening .mysiss-mic-ring{
    border-color: rgba(124,58,237,.20);
    animation: mysissRing 1.1s infinite;
  }

  @keyframes mysissPulse{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.12); }
    100%{ transform: scale(1); }
  }
  @keyframes mysissRing{
    0%{ transform: scale(.92); opacity:.25; }
    70%{ transform: scale(1.06); opacity:.0; }
    100%{ transform: scale(1.06); opacity:0; }
  }

  @media (max-width:520px){
    .mysiss-overlay{ justify-content:center; }
    .mysiss-gif-btn{ right:14px; bottom:14px; }
  }

</style>
</head>
<body>
<header>
  <div class="t">MedVoice | Transcripción</div>
  <div class="s">Asistente clínico y dictado para consulta</div>
</header>

<div class="wrap">
  <div class="card">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;">
      <div class="small">
        <b>Médico:</b> <span id="doctorLbl">-</span> &nbsp; | &nbsp;
        <b>Paciente:</b> <span id="patLbl">-</span> &nbsp; | &nbsp;
        <b>Episodio:</b> <span id="falLbl">-</span> &nbsp; | &nbsp;
        <b>Campo:</b> <span id="fieldLbl">-</span>
      </div>
      <div class="pill" id="envPill">Listo</div>
    </div>
    <div class="small" style="margin-top:10px">
      Asistente por voz: <b id="wakeLbl">-</b> / detener: <b id="stopLbl">-</b>. Dictado: <b>iniciar</b>, <b>fin</b>, <b>enviar</b>.
    </div>
  </div>

  <div class="card">
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn" id="btnRecToggle">Iniciar dictado</button>
      <button class="btn btn-warn" id="btnSend" disabled>Enviar a SAP</button>
      <button class="btn btn-ghost" id="btnClear">Limpiar</button>
    </div>

    <div class="status" id="status">Estado: en espera.</div>

    <div style="margin-top:12px">
      <textarea id="txt" placeholder="Aquí aparecerá la transcripción..."></textarea>
    </div>
  </div>

  <div class="card" id="dictationLogCard" style="display:none;">
    <h3 style="margin:0 0 10px 0;font-size:16px;">Log de dictado</h3>
    <div class="mono" id="log"></div>
  </div>
</div>

<!-- mySiss Voice Assistant (GIF floating) -->
<div id="mySissGifBtn" class="mysiss-gif-btn" aria-label="mySiss Assistant">
  <img src="src/img/mySiss_Gif.gif" alt="mySiss Assistant">
</div>

<!-- Popup emergente (sin texto visible) -->
<div id="mySissOverlay" class="mysiss-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="mysiss-modal" id="mySissModal">
    <button class="mysiss-close" id="mySissClose" aria-label="Cerrar"></button>

    <!-- Orbe / mic (único elemento interactivo del popup) -->
    <button class="mysiss-mic-orb" id="mySissMic" aria-label="Hablar">
      <span class="mysiss-mic-core"></span>
      <span class="mysiss-mic-ring"></span>
    </button>
  </div>
</div>

<script>
(function(){ history.replaceState({}, document.title, "/static/medvoice-transcribe.html"); })();

const $ = (id)=>document.getElementById(id);
const MODE = { IDLE: "IDLE", GIF_ASSISTANT: "GIF_ASSISTANT", DICTATION: "DICTATION" };
let currentMode = MODE.IDLE;
let dictationStartedOnce = false;

function getValue(key, fallback=""){
  const fromSession = (sessionStorage.getItem("medvoice." + key) || "").trim();
  const fromLocal = (localStorage.getItem("medvoice." + key) || "").trim();
  const fromQuery = (new URL(window.location.href).searchParams.get(key) || "").trim();
  return fromSession || fromLocal || fromQuery || fallback;
}

const ctx = {
  doctor_id: getValue("doctor_id", ""),
  api: getValue("api", window.location.origin).replace(/\/+$/, ""),
  field: getValue("field", "ZTA915ENP7"),
  patnr: getValue("patnr", ""),
  falnr: getValue("falnr", ""),
  WAKE: getValue("wake_word", "SAP"),
  STOP: getValue("stop_word", "Apagar")
};

window.MEDVOICE_STATE = { mode: MODE.IDLE };

function normalize(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

const normalizedWake = normalize(ctx.WAKE);
const normalizedStop = normalize(ctx.STOP);
const normalizedIniciar = normalize("iniciar");
const normalizedFin = normalize("fin");
const normalizedEnviar = normalize("enviar");

function setMode(next){
  currentMode = next;
  window.MEDVOICE_STATE.mode = next;
}

function updateHeader(){
  $("doctorLbl").textContent = ctx.doctor_id || "No informado";
  $("patLbl").textContent = ctx.patnr || "No informado";
  $("falLbl").textContent = ctx.falnr || "No informado";
  $("fieldLbl").textContent = ctx.field || "No informado";
  $("wakeLbl").textContent = ctx.WAKE;
  $("stopLbl").textContent = ctx.STOP;
}

function setStatus(msg, level=""){
  if (!level) {
    $("status").textContent = `Estado: ${msg}`;
    return;
  }
  $("status").innerHTML = `Estado: <span class="${level}">${msg}</span>`;
}

function dictationLog(msg){
  if (currentMode !== MODE.DICTATION || !dictationStartedOnce) return;
  $("dictationLogCard").style.display = "block";
  const el = $("log");
  el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function updatePill(){
  if (currentMode === MODE.GIF_ASSISTANT) {
    $("envPill").textContent = "Asistente activo";
    return;
  }
  if (currentMode === MODE.DICTATION) {
    $("envPill").textContent = "Dictado activo";
    return;
  }
  $("envPill").textContent = "En espera";
}

let dictationRecorder = null;
let dictationStream = null;
let dictationChunks = [];

async function getMic(){
  return navigator.mediaDevices.getUserMedia({ audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true } });
}

async function startDictation(){
  if (currentMode !== MODE.IDLE) return;
  try{
    dictationStream = await getMic();
    dictationChunks = [];
    dictationRecorder = new MediaRecorder(dictationStream, { mimeType:"audio/webm" });
    dictationRecorder.ondataavailable = (e)=>{ if(e.data && e.data.size>0) dictationChunks.push(e.data); };
    dictationRecorder.onstop = async ()=>{
      if (dictationStream) dictationStream.getTracks().forEach(t=>t.stop());
      dictationStream = null;
      dictationRecorder = null;
      setMode(MODE.IDLE);
      updatePill();
      $("btnRecToggle").textContent = "Iniciar dictado";
      setStatus("dictado detenido.", "ok");
      if (dictationChunks.length) await transcribeBackend();
    };
    dictationRecorder.start(250);
    dictationStartedOnce = true;
    setMode(MODE.DICTATION);
    updatePill();
    $("btnRecToggle").textContent = "Detener dictado";
    $("btnSend").disabled = true;
    setStatus("dictado en curso.", "ok");
    dictationLog("Dictado iniciado.");
  }catch(_e){
    setStatus("sin acceso al micrófono.", "err");
  }
}

async function stopDictation(){
  if (currentMode !== MODE.DICTATION || !dictationRecorder) return;
  setStatus("finalizando dictado...", "warn");
  dictationLog("Deteniendo dictado.");
  if(dictationRecorder.state !== "inactive") dictationRecorder.stop();
}

async function transcribeBackend(){
  const blob = new Blob(dictationChunks, { type:"audio/webm" });
  const fd = new FormData();
  fd.append("doctor_id", ctx.doctor_id);
  fd.append("audio", blob, "dictation.webm");
  fd.append("target_field", ctx.field);

  dictationLog(`POST ${ctx.api}/api/transcribe`);
  try{
    const r = await fetch(ctx.api + "/api/transcribe", { method:"POST", body: fd });
    const j = await r.json().catch(()=>({ok:false,message:"Respuesta inválida"}));
    if(!(r.ok && j.ok)){
      setStatus(`falló ${j.message || ""}`.trim(), "err");
      dictationLog("Transcripción fallida.");
      return;
    }
    const text = (j.text || "").trim();
    $("txt").value = text;
    window.MEDVOICE_TRANSCRIPT = text;
    localStorage.setItem("medvoice.last_transcript_text", text);
    $("btnSend").disabled = !text;
    setStatus("dictado transcrito.", "ok");
    dictationLog("Transcripción lista.");
  }catch(_e){
    setStatus("error al transcribir.", "err");
    dictationLog("Backend no disponible para transcripción.");
  }
}

async function sendToSAP(){
  const text = ($("txt").value || "").trim();
  if (!text) {
    if (currentMode === MODE.DICTATION) dictationLog("No hay texto para enviar.");
    return;
  }
  try{
    const payload = {
      doctor_id: ctx.doctor_id || "",
      patnr: ctx.patnr || "",
      falnr: ctx.falnr || "",
      field: ctx.field || "",
      text
    };
    const res = await fetch(ctx.api + "/api/push_result", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("push failed");
    setStatus("enviado a SAP.", "ok");
    if (currentMode === MODE.DICTATION) dictationLog("Texto enviado a SAP.");
  }catch(_e){
    // TODO: IMPLEMENT_SAP_SEND_HERE
    setStatus("no fue posible enviar a SAP.", "warn");
    if (currentMode === MODE.DICTATION) dictationLog("Fallo en envío a SAP.");
  }
}

const gifAssistant = (function(){
  const gifBtn   = document.getElementById('mySissGifBtn');
  const overlay  = document.getElementById('mySissOverlay');
  const modal    = document.getElementById('mySissModal');
  const closeBtn = document.getElementById('mySissClose');
  const micOrb   = document.getElementById('mySissMic');

  if(!gifBtn || !overlay || !modal || !closeBtn || !micOrb) return null;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = null;
  let listening = false;

  function speakES(text){
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'es-CO';
      u.rate = 1.0;
      u.pitch = 1.0;
      window.speechSynthesis.speak(u);
    }catch(_e){}
  }

  function openPopup(){
    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden', 'false');
    speakES("Doctor, ¿qué información clínica del paciente necesita consultar?");
  }

  function closePopup(){
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden', 'true');
    stopListening();
  }

  function initRec(){
    if (!SpeechRecognition) return null;

    const r = new SpeechRecognition();
    r.lang = 'es-CO';
    r.interimResults = false;
    r.continuous = false;

    r.onstart = () => {
      listening = true;
      modal.classList.add('mysiss-listening');
    };

    r.onerror = () => {
      listening = false;
      modal.classList.remove('mysiss-listening');
      speakES("No tengo acceso al micrófono. Por favor habilite el permiso del navegador e intente de nuevo.");
    };

    r.onend = () => {
      listening = false;
      modal.classList.remove('mysiss-listening');
    };

    r.onresult = (event) => {
      const said = (event.results?.[0]?.[0]?.transcript || '').trim();
      if(!said) return;
      respondToQueryByVoice(said);
    };

    return r;
  }

  function startListening(){
    if(!rec) rec = initRec();
    if(!rec){
      speakES("Este navegador no soporta dictado por voz.");
      return;
    }
    try{ rec.start(); }catch(_e){}
  }

  function stopListening(){
    if(rec && listening){
      try{ rec.stop(); }catch(_e){}
    }
  }

  micOrb.addEventListener('click', () => {
    if(listening) stopListening();
    else startListening();
  });

  function respondToQueryByVoice(query){
    const q = normalize(query);

    // Respuestas demo (listas para conectar a SAP después)
    if(q.includes('hemograma') || q.includes('cuadro hematico') || q.includes('cbc')){
      speakES("Entendido. Consultando el hemograma más reciente. En este prototipo, la respuesta es simulada.");
      return;
    }
    if(q.includes('alerg')){
      speakES("Entendido. Consultando alergias registradas. En este prototipo, la respuesta es simulada.");
      return;
    }
    if(q.includes('diagnost') || q.includes('dx')){
      speakES("Entendido. Consultando diagnósticos activos. En este prototipo, la respuesta es simulada.");
      return;
    }
    if(q.includes('medic') || q.includes('tratam')){
      speakES("Entendido. Consultando medicación y tratamiento actual. En este prototipo, la respuesta es simulada.");
      return;
    }

    speakES("Recibido. Confirmo la consulta solicitada. En este prototipo la respuesta es simulada, quedará lista para integración con SAP.");
  }

  gifBtn.addEventListener('click', ()=>{});
  closeBtn.addEventListener('click', ()=>{});
  overlay.addEventListener('click', ()=>{});

  return { openPopup, closePopup };
})();

let commandRecognition = null;
let commandLastTs = 0;

function setupCommandRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const recognition = new SR();
  recognition.lang = "es-ES";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (event)=>{
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const phrase = normalize((event.results[i][0] && event.results[i][0].transcript) || "");
      if (!phrase) continue;
      const now = Date.now();
      if (now - commandLastTs < 900) continue;

      if (currentMode === MODE.IDLE && normalizedWake && phrase.includes(normalizedWake)) {
        commandLastTs = now;
        setMode(MODE.GIF_ASSISTANT);
        updatePill();
        setStatus("asistente activo.", "ok");
        if (gifAssistant) gifAssistant.openPopup();
        continue;
      }
      if (currentMode === MODE.GIF_ASSISTANT && normalizedStop && phrase.includes(normalizedStop)) {
        commandLastTs = now;
        if (gifAssistant) gifAssistant.closePopup();
        setMode(MODE.IDLE);
        updatePill();
        setStatus("asistente detenido.", "ok");
        continue;
      }
      if (currentMode === MODE.IDLE && phrase.includes(normalizedIniciar)) {
        commandLastTs = now;
        startDictation();
        continue;
      }
      if (currentMode === MODE.DICTATION && phrase.includes(normalizedFin)) {
        commandLastTs = now;
        stopDictation();
        continue;
      }
      if (currentMode === MODE.DICTATION && phrase.includes(normalizedEnviar)) {
        commandLastTs = now;
        sendToSAP();
      }
    }
  };

  recognition.onend = ()=>{ try{ recognition.start(); }catch(_e){} };
  recognition.onerror = ()=>{};
  return recognition;
}

$("btnRecToggle").onclick = ()=>{
  if (currentMode === MODE.DICTATION) stopDictation();
  else if (currentMode === MODE.IDLE) startDictation();
};
$("btnSend").onclick = ()=>{ sendToSAP(); };
$("btnClear").onclick = ()=>{
  $("txt").value = "";
  $("btnSend").disabled = true;
  if (currentMode === MODE.DICTATION) dictationLog("Texto limpiado.");
};

updateHeader();
updatePill();
window.MEDVOICE_TRANSCRIPT = localStorage.getItem("medvoice.last_transcript_text") || "";
if (window.MEDVOICE_TRANSCRIPT) {
  $("txt").value = window.MEDVOICE_TRANSCRIPT;
  $("btnSend").disabled = false;
}
commandRecognition = setupCommandRecognition();
if (commandRecognition) { try{ commandRecognition.start(); }catch(_e){} }
</script>
</body>
</html>
