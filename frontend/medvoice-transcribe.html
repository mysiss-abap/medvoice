<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Transcripción</title>
  <style>
    :root{
      --sap-blue:#0a6ed1; --sap-blue-2:#0854a0; --sap-bg:#f7f7f7; --sap-card:#fff;
      --sap-text:#1d2d3e; --sap-muted:#6a6d70; --sap-border:#d9d9d9;
      --ok:#107e3e; --warn:#e9730c; --err:#bb0000;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--sap-bg);font-family:Segoe UI, Arial, sans-serif;color:var(--sap-text);height:100vh;overflow:hidden}
    header{background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));color:#fff;padding:14px 18px;display:grid;grid-template-columns:1fr 2fr 1fr;align-items:center;gap:12px}
    .leftTitle .t{font-size:20px;font-weight:700;line-height:1}
    .leftTitle .s{font-size:13px;opacity:.95;margin-top:4px}
    .patient-line{text-align:center;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wrap{max-width:1040px;margin:14px auto;padding:0 14px;height:calc(100vh - 84px);display:grid;grid-template-rows:auto auto 1fr;gap:12px}
    .card{background:var(--sap-card);border:1px solid var(--sap-border);border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.05);padding:14px}
    .btn{border:1px solid var(--sap-blue); background:var(--sap-blue); color:#fff;border-radius:8px;padding:10px 14px;font-size:14px;cursor:pointer;transition:.15s;user-select:none;font-weight:700}
    .btn:hover{filter:brightness(.95)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn-ghost{background:#fff;color:var(--sap-blue);border-color:var(--sap-blue)}
    textarea{border:1px solid var(--sap-border);border-radius:8px;padding:10px;font-size:14px;outline:none;background:#fff;width:100%;height:100%;resize:none;line-height:1.4;overflow:auto}
    textarea:focus{border-color:var(--sap-blue)}
    .status{margin-top:10px;font-size:13px;min-height:18px}
    .ok{color:var(--ok)} .warn{color:var(--warn)} .err{color:var(--err)}
    .small{font-size:12px;color:var(--sap-muted);line-height:1.4}
    .split{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;min-height:0}
    .mono{font-family:Consolas, monospace;font-size:12px;white-space:pre-wrap;height:100%;overflow:auto}

  /* ==== mySiss Voice Assistant (GIF + popup sin texto) ==== */
  .mysiss-gif-btn{
    position:fixed;
    right:18px;
    bottom:18px;
    width:86px;
    height:86px;
    border-radius:26px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: 0 18px 60px rgba(0,0,0,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
    z-index:9999;
    backdrop-filter: blur(10px);
    transition: transform .12s ease;
  }
  .mysiss-gif-btn:active{ transform: scale(.98); }
  .mysiss-gif-btn img{
    width:72px;
    height:72px;
    object-fit:contain;
    border-radius:20px;
    display:block;
  }

  .mysiss-overlay{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,.55);
    display:none;
    align-items:flex-end;
    justify-content:flex-end;
    padding:18px;
    z-index:9998;
  }
  .mysiss-overlay.show{ display:flex; }

  .mysiss-modal{
    width:min(420px, 100%);
    height:min(240px, 60vh);
    border-radius:22px;
    background: rgba(12,16,28,.55);
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: 0 18px 60px rgba(0,0,0,.55);
    backdrop-filter: blur(14px);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }

  .mysiss-close{
    position:absolute;
    top:12px;
    right:12px;
    width:40px;
    height:40px;
    border-radius:14px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    cursor:pointer;
  }
  .mysiss-close::before, .mysiss-close::after{
    content:"";
    position:absolute;
    top:50%; left:50%;
    width:18px; height:2px;
    background: rgba(255,255,255,.80);
    transform-origin:center;
  }
  .mysiss-close::before{ transform: translate(-50%,-50%) rotate(45deg); }
  .mysiss-close::after{  transform: translate(-50%,-50%) rotate(-45deg); }

  .mysiss-mic-orb{
    width:120px;
    height:120px;
    border-radius:999px;
    border: 1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.06);
    cursor:pointer;
    position:relative;
    display:grid;
    place-items:center;
    overflow:hidden;
  }

  .mysiss-mic-core{
    width:24px; height:24px;
    border-radius:999px;
    background: rgba(124,58,237,.9);
    box-shadow: 0 0 0 10px rgba(124,58,237,.14);
  }

  .mysiss-mic-ring{
    position:absolute;
    inset:-30px;
    border-radius:999px;
    border: 2px solid rgba(124,58,237,.0);
    pointer-events:none;
  }

  .mysiss-listening .mysiss-mic-core{
    box-shadow: 0 0 0 14px rgba(124,58,237,.18);
    animation: mysissPulse 1.1s infinite;
  }
  .mysiss-listening .mysiss-mic-ring{
    border-color: rgba(124,58,237,.20);
    animation: mysissRing 1.1s infinite;
  }

  @keyframes mysissPulse{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.12); }
    100%{ transform: scale(1); }
  }
  @keyframes mysissRing{
    0%{ transform: scale(.92); opacity:.25; }
    70%{ transform: scale(1.06); opacity:.0; }
    100%{ transform: scale(1.06); opacity:0; }
  }

  @media (max-width:900px){
    body{overflow:auto}
    header{grid-template-columns:1fr}
    .patient-line{text-align:left}
    .wrap{height:auto;display:block}
    .split{grid-template-columns:1fr}
  }

</style>
</head>
<body>
<header>
  <div class="leftTitle">
    <div class="t">MedVoice</div>
    <div class="s">Transcripción</div>
  </div>
  <div class="patient-line" id="patientLine">Paciente - | Episodio - | ANAMNESIS</div>
  <div></div>
</header>

<div class="wrap">
  <div class="card">
    <div class="small"><b>Médico:</b> <span id="doctorCode">-</span> &nbsp; | &nbsp; <b>Nombre:</b> <span id="doctorName">No informado</span></div>
    <div class="status" id="status">Estado: en espera.</div>
  </div>

  <div class="card">
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn" id="btnRecToggle">Iniciar transcripción</button>
      <button class="btn" id="btnSend">Enviar a SAP</button>
      <button class="btn btn-ghost" id="btnClear">Limpiar</button>
    </div>
  </div>

  <div class="split">
    <div class="card" style="min-height:0;display:flex;flex-direction:column;">
      <textarea id="txt" placeholder="Aquí aparecerá la transcripción..."></textarea>
    </div>
    <div class="card" id="dictationLogCard" style="display:none;min-height:0;">
      <h3 style="margin:0 0 10px 0;font-size:16px;">Log de dictado</h3>
      <div class="mono" id="log"></div>
    </div>
  </div>
</div>

<!-- mySiss Voice Assistant (GIF floating) -->
<div id="mySissGifBtn" class="mysiss-gif-btn" aria-label="mySiss Assistant">
  <img src="src/img/mySiss_Gif.gif" alt="mySiss Assistant">
</div>

<!-- Popup emergente (sin texto visible) -->
<div id="mySissOverlay" class="mysiss-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="mysiss-modal" id="mySissModal">
    <button class="mysiss-close" id="mySissClose" aria-label="Cerrar"></button>

    <!-- Orbe / mic (único elemento interactivo del popup) -->
    <button class="mysiss-mic-orb" id="mySissMic" aria-label="Hablar">
      <span class="mysiss-mic-core"></span>
      <span class="mysiss-mic-ring"></span>
    </button>
  </div>
</div>

<script>
(function(){ history.replaceState({}, document.title, "/static/medvoice-transcribe.html"); })();

const MODE = { IDLE: "IDLE", GIF_ASSISTANT: "GIF_ASSISTANT", DICTATION: "DICTATION" };
const $ = (id)=>document.getElementById(id);
let currentMode = MODE.IDLE;
let dictationStartedOnce = false;

function getValue(key, fallback=""){
  return (sessionStorage.getItem("medvoice." + key) || localStorage.getItem("medvoice." + key) || fallback).trim();
}
function normalize(s){
  return String(s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
}

const ctx = {
  doctor_id: getValue("doctor_id", ""),
  doctor_name: getValue("doctor_name", getValue("doctor_fullname", "No informado")),
  api: getValue("api", window.location.origin).replace(/\/+$/, ""),
  field: getValue("field", "ANAMNESIS"),
  patnr: getValue("patnr", "-"),
  falnr: getValue("falnr", "-"),
  wake_word: getValue("wake_word", "mysiss"),
  stop_word: getValue("stop_word", "apagar"),
  iniciar_word: getValue("iniciar_word", "iniciar"),
  fin_word: getValue("fin_word", "fin"),
  enviar_word: getValue("enviar_word", "enviar")
};

const keys = {
  wake: normalize(ctx.wake_word),
  stop: normalize(ctx.stop_word),
  iniciar: normalize(ctx.iniciar_word),
  fin: normalize(ctx.fin_word),
  enviar: normalize(ctx.enviar_word)
};

function setMode(mode){ currentMode = mode; }
function setStatus(message, cls){
  if (!cls) { $("status").textContent = "Estado: " + message; return; }
  $("status").innerHTML = `Estado: <span class="${cls}">${message}</span>`;
}
function logDictation(msg){
  if (currentMode !== MODE.DICTATION || !dictationStartedOnce) return;
  $("dictationLogCard").style.display = "block";
  const el = $("log");
  el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

$("patientLine").textContent = `Paciente ${ctx.patnr || "-"} | Episodio ${ctx.falnr || "-"} | ${ctx.field || "ANAMNESIS"}`;
$("doctorCode").textContent = ctx.doctor_id || "No informado";
$("doctorName").textContent = ctx.doctor_name || "No informado";

let dictationRecorder = null;
let dictationStream = null;
let dictationChunks = [];

function stopStream(stream){ try{ stream && stream.getTracks().forEach(t=>t.stop()); }catch(_e){} }
async function getMic(){ return navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}}); }

async function startDictation(){
  if (currentMode !== MODE.IDLE) return;
  try{
    dictationStream = await getMic();
    dictationChunks = [];
    dictationRecorder = new MediaRecorder(dictationStream, { mimeType:"audio/webm" });
    dictationRecorder.ondataavailable = (e)=>{ if (e.data && e.data.size) dictationChunks.push(e.data); };
    dictationRecorder.onstop = async ()=>{
      stopStream(dictationStream);
      dictationStream = null;
      dictationRecorder = null;
      setMode(MODE.IDLE);
      $("btnRecToggle").textContent = "Iniciar transcripción";
      setStatus("transcripción detenida.", "ok");
      if (dictationChunks.length) await transcribeBackend();
    };
    dictationRecorder.start(250);
    dictationStartedOnce = true;
    setMode(MODE.DICTATION);
    $("btnRecToggle").textContent = "Terminar transcripción";
    setStatus("transcripción en curso.", "ok");
    logDictation("Transcripción iniciada.");
  }catch(_e){
    setStatus("no se pudo activar el micrófono.", "err");
  }
}

async function stopDictation(){
  if (currentMode !== MODE.DICTATION || !dictationRecorder) return;
  setStatus("finalizando transcripción...", "warn");
  logDictation("Finalizando transcripción.");
  try{ if (dictationRecorder.state !== "inactive") dictationRecorder.stop(); }catch(_e){}
}

async function transcribeBackend(){
  const blob = new Blob(dictationChunks, {type:"audio/webm"});
  const fd = new FormData();
  fd.append("doctor_id", ctx.doctor_id || "");
  fd.append("target_field", ctx.field || "");
  fd.append("audio", blob, "dictation.webm");
  try{
    const res = await fetch(ctx.api + "/api/transcribe", { method:"POST", body: fd });
    const data = await res.json().catch(()=>({ok:false}));
    if (!res.ok || !data.ok) throw new Error("transcribe error");
    const text = (data.text || "").trim();
    $("txt").value = text;
    window.MEDVOICE_TRANSCRIPT = text;
    localStorage.setItem("medvoice.last_transcript_text", text);
    logDictation(text ? "Transcripción recibida." : "Transcripción sin contenido.");
    setStatus("texto listo para enviar.", "ok");

    // Código HTTP alterno para envío directo (mantener como referencia):
    // await fetch(ctx.api + "/api/push_result", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({doctor_id:ctx.doctor_id, patnr:ctx.patnr, falnr:ctx.falnr, field:ctx.field, text}) });
  }catch(_e){
    const cached = ($("txt").value || "").trim();
    localStorage.setItem("medvoice.last_transcript_text", cached);
    setStatus("no se pudo transcribir ahora; puede enviar más tarde.", "warn");
    logDictation("No se pudo contactar el backend de transcripción.");
  }
}

function sendToSapEvent(){
  const text = ($("txt").value || localStorage.getItem("medvoice.last_transcript_text") || "").trim();
  if (!text) {
    if (currentMode === MODE.DICTATION) logDictation("No hay texto para enviar.");
    return;
  }
  localStorage.setItem("medvoice.last_transcript_text", text);
  window.location.href = "sapevent:MEDVOICE_SET_FIELD?target=" + encodeURIComponent(ctx.field || "") + "&text=" + encodeURIComponent(text);
}

// ===== mySiss Voice Popup: SIN TEXTO en UI (solo voz + orbe mic) =====
const gifAssistant = (function(){
  const gifBtn   = document.getElementById('mySissGifBtn');
  const overlay  = document.getElementById('mySissOverlay');
  const modal    = document.getElementById('mySissModal');
  const closeBtn = document.getElementById('mySissClose');
  const micOrb   = document.getElementById('mySissMic');

  if(!gifBtn || !overlay || !modal || !closeBtn || !micOrb) return null;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = null;
  let listening = false;

  function speakES(text){
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'es-CO';
      u.rate = 1.0;
      u.pitch = 1.0;
      window.speechSynthesis.speak(u);
    }catch(_e){}
  }

  function openPopup(){
    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden', 'false');
    speakES("Doctor, ¿qué información clínica del paciente necesita consultar?");
  }

  function closePopup(){
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden', 'true');
    stopListening();
  }

  function initRec(){
    if (!SpeechRecognition) return null;

    const r = new SpeechRecognition();
    r.lang = 'es-CO';
    r.interimResults = false;
    r.continuous = false;

    r.onstart = () => { listening = true; modal.classList.add('mysiss-listening'); };
    r.onerror = () => { listening = false; modal.classList.remove('mysiss-listening'); speakES("No tengo acceso al micrófono. Por favor habilite el permiso del navegador e intente de nuevo."); };
    r.onend = () => { listening = false; modal.classList.remove('mysiss-listening'); };
    r.onresult = (event) => {
      const said = (event.results?.[0]?.[0]?.transcript || '').trim();
      if(!said) return;
      respondToQueryByVoice(said);
    };

    return r;
  }

  function startListening(){
    if(!rec) rec = initRec();
    if(!rec){
      speakES("Este navegador no soporta dictado por voz.");
      return;
    }
    try{ rec.start(); }catch(_e){}
  }

  function stopListening(){
    if(rec && listening){
      try{ rec.stop(); }catch(_e){}
    }
  }

  micOrb.addEventListener('click', () => { if(listening) stopListening(); else startListening(); });
  gifBtn.addEventListener('click', () => { if (currentMode === MODE.IDLE) { setMode(MODE.GIF_ASSISTANT); openPopup(); } });
  closeBtn.addEventListener('click', () => { closePopup(); if (currentMode === MODE.GIF_ASSISTANT) setMode(MODE.IDLE); });
  overlay.addEventListener('click', (e) => { if(e.target === overlay){ closePopup(); if (currentMode === MODE.GIF_ASSISTANT) setMode(MODE.IDLE); } });

  function respondToQueryByVoice(query){
    const q = normalize(query);

    // Respuestas demo (listas para conectar a SAP después)
    if(q.includes('hemograma') || q.includes('cuadro hematico') || q.includes('cbc')){
      speakES("Entendido. Consultando el hemograma más reciente. En este prototipo, la respuesta es simulada.");
      return;
    }
    if(q.includes('alerg')){
      speakES("Entendido. Consultando alergias registradas. En este prototipo, la respuesta es simulada.");
      return;
    }
    if(q.includes('diagnost') || q.includes('dx')){
      speakES("Entendido. Consultando diagnósticos activos. En este prototipo, la respuesta es simulada.");
      return;
    }
    if(q.includes('medic') || q.includes('tratam')){
      speakES("Entendido. Consultando medicación y tratamiento actual. En este prototipo, la respuesta es simulada.");
      return;
    }

    speakES("Recibido. Confirmo la consulta solicitada. En este prototipo la respuesta es simulada, quedará lista para integración con SAP.");
  }

  return { openPopup, closePopup };
})();

let commandRecognition = null;
let commandLastTs = 0;

function setupCommandRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const recognition = new SR();
  recognition.lang = "es-ES";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (event)=>{
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const phrase = normalize((event.results[i][0] && event.results[i][0].transcript) || "");
      if (!phrase) continue;
      const now = Date.now();
      if (now - commandLastTs < 900) continue;

      if (currentMode === MODE.IDLE && keys.wake && phrase.includes(keys.wake)) {
        commandLastTs = now;
        setMode(MODE.GIF_ASSISTANT);
        if (gifAssistant) gifAssistant.openPopup();
        continue;
      }
      if (currentMode === MODE.GIF_ASSISTANT && keys.stop && phrase.includes(keys.stop)) {
        commandLastTs = now;
        if (gifAssistant) gifAssistant.closePopup();
        setMode(MODE.IDLE);
        continue;
      }
      if (currentMode === MODE.IDLE && keys.iniciar && phrase.includes(keys.iniciar)) {
        commandLastTs = now;
        startDictation();
        continue;
      }
      if (currentMode === MODE.DICTATION && keys.fin && phrase.includes(keys.fin)) {
        commandLastTs = now;
        stopDictation();
        continue;
      }
      if (currentMode === MODE.DICTATION && keys.enviar && phrase.includes(keys.enviar)) {
        commandLastTs = now;
        sendToSapEvent();
      }
    }
  };

  recognition.onend = ()=>{ try{ recognition.start(); }catch(_e){} };
  recognition.onerror = ()=>{};
  return recognition;
}

$("btnRecToggle").onclick = ()=>{ if (currentMode === MODE.DICTATION) stopDictation(); else if (currentMode === MODE.IDLE) startDictation(); };
$("btnSend").onclick = ()=>{ sendToSapEvent(); };
$("btnClear").onclick = ()=>{
  $("txt").value = "";
  localStorage.removeItem("medvoice.last_transcript_text");
  if (currentMode === MODE.DICTATION) logDictation("Texto limpiado.");
};

window.MEDVOICE_TRANSCRIPT = localStorage.getItem("medvoice.last_transcript_text") || "";
if (window.MEDVOICE_TRANSCRIPT) $("txt").value = window.MEDVOICE_TRANSCRIPT;
commandRecognition = setupCommandRecognition();
if (commandRecognition) { try{ commandRecognition.start(); }catch(_e){} }
</script>
</body>
</html>
