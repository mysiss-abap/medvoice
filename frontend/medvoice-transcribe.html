<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Transcripción</title>

  <style>
    :root{
      --sap-blue:#0a6ed1; --sap-blue-2:#0854a0; --sap-bg:#f7f7f7; --sap-card:#fff;
      --sap-text:#1d2d3e; --sap-muted:#6a6d70; --sap-border:#d9d9d9;
      --ok:#107e3e; --warn:#e9730c; --err:#bb0000;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--sap-bg);
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--sap-text);
      overflow:hidden; /* sin scroll del browser */
    }

    /* ===== HEADER ===== */
    header{
      background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));
      color:#fff;
      padding:14px 0;
    }
    .head-inner{
      max-width:980px;
      margin:0 auto;
      padding:0 14px;
    }

    /* Grid: izquierda MedVoice / centro paciente / derecha vacío */
    .head-grid{
      display:grid;
      grid-template-columns: 220px 1fr 60px;
      align-items:start;
      gap:10px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .app-name{font-size:22px;font-weight:800;line-height:1}
    .app-sub{font-size:13px;opacity:.95;font-weight:600}

    /* Centro paciente (2 líneas, transparente, centrado) */
    .patient-center{
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
      justify-content:flex-start;
      text-align:center;
      min-width:0;
    }
    .patient-line{
      font-size:13.5px;
      font-weight:800;
      opacity:.96;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
      background:transparent;
      border:none;
      padding:0;
      margin:0;
    }

    /* ===== LAYOUT ===== */
    .wrap{
      max-width:980px;
      margin:18px auto;
      padding:0 14px;
      height:calc(100vh - 92px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      background:var(--sap-card);
      border:1px solid var(--sap-border);
      border-radius:12px;
      box-shadow:0 1px 2px rgba(0,0,0,.05);
      padding:16px;
    }

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
    .label{font-size:14px;color:var(--sap-muted);line-height:1.5}
    .label b{color:var(--sap-text)}
    .chip{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      border:1px solid var(--sap-border);
      background:#eef2f7;
      color:var(--sap-muted);
    }
    .chip-ok{background:#e7f4ec;color:var(--ok)}
    .chip-warn{background:#fff3e0;color:var(--warn)}
    .chip-err{background:#fde8ea;color:var(--err)}

    .btns{display:flex;gap:10px;flex-wrap:wrap;}
    .btn{
      border:1px solid var(--sap-blue);
      background:var(--sap-blue);
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
      transition:.15s;
      user-select:none;
      font-weight:900;
    }
    .btn:hover{filter:brightness(.95);}
    .btn:disabled{opacity:.55;cursor:not-allowed;}
    .btn-ghost{background:#fff;color:var(--sap-blue);border-color:var(--sap-blue);}
    .btn-warn{background:var(--warn);border-color:var(--warn);}

    .status{margin-top:10px;font-size:13px;color:var(--sap-muted);}
    .ok{color:var(--ok);font-weight:900}
    .warn{color:var(--warn);font-weight:900}
    .err{color:var(--err);font-weight:900}

    textarea{
      border:1px solid var(--sap-border);
      border-radius:10px;
      padding:12px 12px;
      font-size:14px;
      outline:none;
      background:#fff;
      width:100%;
      height:320px;
      resize:none;
      line-height:1.45;
      overflow:auto;
      white-space:pre-wrap; /* respeta ENTER */
    }
    textarea:focus{border-color:var(--sap-blue);}

    /* Log con scroll propio */
    .logcard{flex:1;min-height:0;display:flex;flex-direction:column}
    .mono{font-family:Consolas, ui-monospace, Menlo, monospace;font-size:12px;white-space:pre-wrap;}
    #log{
      flex:1;
      min-height:0;
      border:1px solid var(--sap-border);
      border-radius:12px;
      padding:12px;
      background:#fff;
      overflow:auto;
    }

    /* mySiss GIF floating */
    .mysiss-gif-btn{
      position:fixed; right:18px; bottom:18px;
      width:86px; height:86px; border-radius:26px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none;
      z-index:9999;
      backdrop-filter: blur(10px);
      transition: transform .12s ease;
    }
    .mysiss-gif-btn:active{ transform: scale(.98); }
    .mysiss-gif-btn img{
      width:72px; height:72px; object-fit:contain;
      border-radius:20px; display:block;
    }
    .mysiss-overlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:flex-end; justify-content:flex-end;
      padding:18px;
      z-index:9998;
    }
    .mysiss-overlay.show{ display:flex; }
    .mysiss-modal{
      width:min(420px, 100%);
      height:min(240px, 60vh);
      border-radius:22px;
      background: rgba(12,16,28,.55);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      backdrop-filter: blur(14px);
      display:flex; align-items:center; justify-content:center;
      position:relative;
      overflow:hidden;
    }
    .mysiss-close{
      position:absolute; top:12px; right:12px;
      width:40px; height:40px; border-radius:14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      cursor:pointer;
    }
    .mysiss-close::before, .mysiss-close::after{
      content:"";
      position:absolute; top:50%; left:50%;
      width:18px; height:2px;
      background: rgba(255,255,255,.80);
      transform-origin:center;
    }
    .mysiss-close::before{ transform: translate(-50%,-50%) rotate(45deg); }
    .mysiss-close::after{  transform: translate(-50%,-50%) rotate(-45deg); }

    .mysiss-mic-orb{
      width:120px; height:120px; border-radius:999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      cursor:pointer;
      position:relative;
      display:grid; place-items:center;
      overflow:hidden;
    }
    .mysiss-mic-core{
      width:24px; height:24px; border-radius:999px;
      background: rgba(124,58,237,.9);
      box-shadow: 0 0 0 10px rgba(124,58,237,.14);
    }
    .mysiss-mic-ring{
      position:absolute; inset:-30px;
      border-radius:999px;
      border: 2px solid rgba(124,58,237,.0);
      pointer-events:none;
    }
    .mysiss-listening .mysiss-mic-core{
      box-shadow: 0 0 0 14px rgba(124,58,237,.18);
      animation: mysissPulse 1.1s infinite;
    }
    .mysiss-listening .mysiss-mic-ring{
      border-color: rgba(124,58,237,.20);
      animation: mysissRing 1.1s infinite;
    }
    @keyframes mysissPulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes mysissRing{0%{transform:scale(.92);opacity:.25}70%{transform:scale(1.06);opacity:0}100%{transform:scale(1.06);opacity:0}}
  </style>
</head>

<body>

<header>
  <div class="head-inner">
    <div class="head-grid">
      <!-- IZQUIERDA: MedVoice / Transcripción -->
      <div class="brand">
        <div class="app-name">MedVoice</div>
        <div class="app-sub">Transcripción</div>
      </div>

      <!-- CENTRO: SOLO datos paciente (2 líneas) -->
      <div class="patient-center">
        <div class="patient-line" id="hdrLine1">Paciente — | Doc. — | Paciente — | Episodio —</div>
        <div class="patient-line" id="hdrLine2">Fecha admisión — | Ubicación — | ANAMNESIS</div>
      </div>

      <!-- DERECHA: vacío -->
      <div></div>
    </div>
  </div>
</header>

<div class="wrap">

  <!-- Datos médico -->
  <div class="card">
    <div class="row">
      <div class="label">
        <b>ID_Médico:</b> <span id="doctorId">—</span>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <b>Médico:</b> <span id="doctorName">—</span>
      </div>
      <div class="chip chip-warn" id="modeChip">Listo</div>
    </div>
  </div>

  <!-- Dictado -->
  <div class="card">
    <div class="btns">
      <button class="btn" id="btnToggle">Iniciar transcripción</button>
      <button class="btn btn-warn" id="btnSend">Enviar a SAP</button>
      <button class="btn btn-ghost" id="btnClear">Limpiar</button>
    </div>

    <div class="status" id="status">Estado: listo.</div>

    <div style="margin-top:12px">
      <textarea id="txt" placeholder="Aquí aparecerá la transcripción..."></textarea>
    </div>
  </div>

  <!-- Log -->
  <div class="card logcard">
    <h3 style="margin:0 0 10px 0;font-size:16px;">Log</h3>
    <div class="mono" id="log"></div>
  </div>

</div>

<!-- mySiss GIF floating -->
<div id="mySissGifBtn" class="mysiss-gif-btn" aria-label="mySiss Assistant">
  <img src="src/img/mySiss_Gif.gif" alt="mySiss Assistant">
</div>

<div id="mySissOverlay" class="mysiss-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="mysiss-modal" id="mySissModal">
    <button class="mysiss-close" id="mySissClose" aria-label="Cerrar"></button>
    <button class="mysiss-mic-orb" id="mySissMic" aria-label="Hablar">
      <span class="mysiss-mic-core"></span>
      <span class="mysiss-mic-ring"></span>
    </button>
  </div>
</div>

<script>
/* ============================================================================
   Persistencia de params + ocultar querystring
============================================================================ */
(function persistParamsAndHide(){
  const u = new URL(window.location.href);
  const sp = u.searchParams;
  const keys = [
    "doctor_id","doctor_name","field","field_label",
    "patnr","falnr","patient_name","patient_doc","adm_date","location_line",
    "session_id",
    "wake_word","stop_word","ini_word","fin_word","env_word","lim_word",
    "ana_word","evo_word","epi_word","api"
  ];

  keys.forEach((k)=>{
    const v = (sp.get(k) || "").trim();
    if(!v) return;
    sessionStorage.setItem("medvoice." + k, v);
    localStorage.setItem("medvoice." + k, v);
  });

  try{ history.replaceState({}, document.title, "/static/medvoice-transcribe.html"); }catch(_e){}
})();

const $ = (id)=>document.getElementById(id);
const NLP_ENABLED = true;

function getValue(key, fallback=""){
  const a = (sessionStorage.getItem("medvoice." + key) || "").trim();
  const b = (localStorage.getItem("medvoice." + key) || "").trim();
  return a || b || fallback;
}

function norm(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function log(m){
  const el = $("log");
  el.textContent += `[${new Date().toLocaleTimeString()}] ${m}\n`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(html, chipClass){
  $("status").innerHTML = "Estado: " + html;
  const chip = $("modeChip");
  chip.className = "chip " + (chipClass || "chip-warn");
}

function isValidAudioDataUrl(value){
  return /^data:audio\/[a-z0-9.+-]+;base64,[a-z0-9+/=]+$/i.test(String(value || "").trim());
}

function getVoiceprint(){
  const voiceprintAudio = (localStorage.getItem("medvoice.voiceprint_audio") || "").trim();
  const hasVoiceprint = localStorage.getItem("medvoice.has_voiceprint") === "1";
  if(!hasVoiceprint || !isValidAudioDataUrl(voiceprintAudio)){
    window.location.replace("/static/medvoice-setup.html");
    return null;
  }
  return voiceprintAudio;
}

async function ensureVoiceprintId(voiceprintDataUrl){
  const existing = (localStorage.getItem("medvoice.voiceprint_id") || "").trim();
  if(existing) return existing;

  const base64 = String(voiceprintDataUrl).split(",")[1] || "";
  const input = new TextEncoder().encode(base64);
  let shortId = "";

  try{
    const digest = await crypto.subtle.digest("SHA-256", input);
    const hex = Array.from(new Uint8Array(digest)).map((b)=>b.toString(16).padStart(2, "0")).join("");
    shortId = hex.slice(0, 16);
  }catch(_e){
    let h = 0;
    for(let i=0;i<base64.length;i++) h = ((h<<5)-h + base64.charCodeAt(i)) | 0;
    shortId = Math.abs(h).toString(16).padStart(16, "0").slice(0, 16);
  }

  localStorage.setItem("medvoice.voiceprint_id", shortId);
  return shortId;
}

function cleanTranscript(text){
  let out = String(text || "");
  out = out.replace(/\s+/g, " ").trim();
  out = out.replace(/\b(eh|em|mmm|pues)\b/gi, " ");
  out = out.replace(/\b(punto y coma)\b/gi, ";");
  out = out.replace(/\b(dos puntos)\b/gi, ":");
  out = out.replace(/\b(coma)\b/gi, ",");
  out = out.replace(/\b(nueva linea|nueva línea)\b/gi, "\n");
  out = out.replace(/\bpunto\b/gi, ".");

  out = out
    .replace(/\s*([,.;:!?])\s*/g, "$1 ")
    .replace(/\n\s+/g, "\n")
    .replace(/[ \t]{2,}/g, " ")
    .replace(/\n{3,}/g, "\n\n")
    .trim();

  out = out.replace(/\b(\w+)(\s+\1\b)+/gi, "$1");

  let result = "";
  let capNext = true;
  for(let i=0;i<out.length;i++){
    const ch = out[i];
    if(capNext && /[a-záéíóúñ]/i.test(ch)){
      result += ch.toUpperCase();
      capNext = false;
    }else{
      result += ch;
    }
    if(/[.!?\n]/.test(ch)) capNext = true;
  }
  return result.trim();
}

const voiceprint = getVoiceprint();
let voiceprintId = "";

const ctx = {
  doctor_id    : getValue("doctor_id", ""),
  doctor_name  : getValue("doctor_name", ""),
  field        : getValue("field", "ANAMNESIS"),
  field_label  : getValue("field_label", ""),
  patnr        : getValue("patnr", ""),
  falnr        : getValue("falnr", ""),
  patient_name : getValue("patient_name", ""),
  patient_doc  : getValue("patient_doc", ""),
  adm_date     : getValue("adm_date", ""),
  location_line: getValue("location_line", ""),
  session_id   : getValue("session_id", `sess_${Date.now()}`),
  wake_word    : getValue("wake_word", ""),
  stop_word    : getValue("stop_word", ""),
  ini_word     : getValue("ini_word", ""),
  fin_word     : getValue("fin_word", ""),
  env_word     : getValue("env_word", ""),
  lim_word     : getValue("lim_word", ""),
  ana_word     : getValue("ana_word", "anamnesis"),
  evo_word     : getValue("evo_word", "evolucion"),
  epi_word     : getValue("epi_word", "epicrisis"),
  api          : getValue("api", "")
};

sessionStorage.setItem("medvoice.session_id", ctx.session_id);
localStorage.setItem("medvoice.session_id", ctx.session_id);

function fieldLabelOnly(v){
  const t = String(v || "").trim();
  if(t) return t.toUpperCase();
  const f = String(ctx.field || "").trim();
  return (f ? f : "ANAMNESIS").toUpperCase();
}

$("hdrLine1").textContent =
  `Paciente ${ctx.patient_name || "—"} | Documento identidad ${ctx.patient_doc || "—"} | Paciente ${ctx.patnr || "—"} | Episodio ${ctx.falnr || "—"}`;

$("hdrLine2").textContent =
  `Fecha admisión ${ctx.adm_date || "—"} | ${ctx.location_line || "—"} | ${fieldLabelOnly(ctx.field_label)}`;

$("doctorId").textContent = ctx.doctor_id || "—";
$("doctorName").textContent = ctx.doctor_name || "—";

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;
let dictActive = false;
let lastCmdAt = 0;
let pauseTimer = null;
let currentSection = null;
const buffers = { ANAMNESIS:"", EVOLUCION:"", EPICRISIS:"" };

const WAKE = norm(ctx.wake_word);
const STOP = norm(ctx.stop_word);
const INI  = norm(ctx.ini_word);
const FIN  = norm(ctx.fin_word);
const ENV  = norm(ctx.env_word);
const LIM  = norm(ctx.lim_word);
const ANA  = norm(ctx.ana_word);
const EVO  = norm(ctx.evo_word);
const EPI  = norm(ctx.epi_word);

const PAUSE_MS = 1100;

function ensureSpeechSupport(){
  if(!SR){
    setStatus('<span class="err">este navegador no soporta SpeechRecognition</span>', "chip-err");
    return false;
  }
  return true;
}

function appendSectionTitle(section){
  $("txt").value += `\n\n=== ${section} ===\n`;
}

function switchSection(section){
  currentSection = section;
  appendSectionTitle(section);
  setStatus(`<span class="ok">sección ${section.toLowerCase()} activa</span>`, "chip-ok");
  log(`Sección activa: ${section}.`);
}

function addToCurrentSection(text){
  const section = currentSection || "ANAMNESIS";
  const prev = buffers[section] || "";
  buffers[section] = (prev + (prev ? " " : "") + text).trim();
}

function schedulePauseEnter(){
  if(!dictActive) return;
  if(pauseTimer) clearTimeout(pauseTimer);
  pauseTimer = setTimeout(()=>{
    if(!dictActive) return;
    const t = $("txt").value || "";
    if(t && !t.endsWith("\n")) $("txt").value = t + "\n";
  }, PAUSE_MS);
}

function maybeHandleCommand(textNorm){
  const now = Date.now();
  if(now - lastCmdAt < 650) return false;

  if(!gifOpen && WAKE && textNorm.includes(WAKE)){ lastCmdAt = now; openGif(); return true; }
  if(gifOpen && STOP && textNorm.includes(STOP)){ lastCmdAt = now; closeGif(); return true; }

  if(!dictActive && INI && textNorm.includes(INI)){ lastCmdAt = now; startDictation(); return true; }
  if(dictActive && FIN && textNorm.includes(FIN)){ lastCmdAt = now; stopDictation(); return true; }

  if(ANA && textNorm.includes(ANA)){ lastCmdAt = now; switchSection("ANAMNESIS"); return true; }
  if(EVO && textNorm.includes(EVO)){ lastCmdAt = now; switchSection("EVOLUCION"); return true; }
  if(EPI && textNorm.includes(EPI)){ lastCmdAt = now; switchSection("EPICRISIS"); return true; }

  if(ENV && textNorm.includes(ENV)){ lastCmdAt = now; queueSubmit(); return true; }
  if(LIM && textNorm.includes(LIM)){ lastCmdAt = now; clearText(); return true; }

  return false;
}

function initRecognition(){
  if(!ensureSpeechSupport()) return null;

  const r = new SR();
  r.lang = "es-CO";
  r.continuous = true;
  r.interimResults = true;

  r.onend = ()=>{
    if(r.__enabledByGesture){
      try{ r.start(); }catch(_e){}
    }
  };

  r.onresult = (event)=>{
    let finalChunk = "";
    let interimChunk = "";

    for(let i=event.resultIndex;i<event.results.length;i++){
      const res = event.results[i];
      const t = (res[0] && res[0].transcript) ? res[0].transcript : "";
      if(res.isFinal) finalChunk += " " + t;
      else interimChunk += " " + t;
    }

    const finalText = finalChunk.trim();
    const interimText = interimChunk.trim();
    const probe = norm(finalText || interimText);

    if(probe && maybeHandleCommand(probe)) return;

    if(dictActive && finalText){
      schedulePauseEnter();
      const cleaned = NLP_ENABLED ? cleanTranscript(finalText) : finalText.trim();
      if(!cleaned) return;
      addToCurrentSection(cleaned);

      const cur = $("txt").value || "";
      const needSpace = cur && !cur.endsWith("\n") && !cur.endsWith(" ");
      $("txt").value = cur + (needSpace ? " " : "") + cleaned;
    }
  };

  return r;
}

function enableRecognitionByGesture(){
  if(rec) return;
  rec = initRecognition();
  if(!rec) return;
  rec.__enabledByGesture = true;
  try{ rec.start(); }catch(_e){}
}

function canUseDictation(){
  return !!voiceprint;
}

function startDictation(){
  if(!canUseDictation()){
    window.location.replace("/static/medvoice-setup.html");
    return;
  }
  dictActive = true;
  $("btnToggle").textContent = "Terminar transcripción";
  setStatus('<span class="ok">escuchando...</span>', "chip-ok");
  enableRecognitionByGesture();
  schedulePauseEnter();
  log("Transcripción iniciada.");
}

function stopDictation(){
  dictActive = false;
  $("btnToggle").textContent = "Iniciar transcripción";
  setStatus('<span class="ok">lista</span>', "chip-ok");
  if(pauseTimer){ clearTimeout(pauseTimer); pauseTimer = null; }
  log("Transcripción detenida.");
}

function clearText(){
  $("txt").value = "";
  buffers.ANAMNESIS = "";
  buffers.EVOLUCION = "";
  buffers.EPICRISIS = "";
  currentSection = null;
  setStatus("listo.", "chip-warn");
  log("Texto y buffers limpiados.");
}

function buildPayload(){
  const fullTextRaw = $("txt").value || "";
  return {
    session_id: ctx.session_id,
    voiceprint_id: voiceprintId || (localStorage.getItem("medvoice.voiceprint_id") || ""),
    doctor_id: ctx.doctor_id,
    doctor_name: ctx.doctor_name,
    patient: {
      patnr: ctx.patnr,
      falnr: ctx.falnr,
      patient_name: ctx.patient_name,
      patient_doc: ctx.patient_doc,
      adm_date: ctx.adm_date,
      location_line: ctx.location_line
    },
    field_label: fieldLabelOnly(ctx.field_label),
    commands: {
      wake_word: ctx.wake_word,
      stop_word: ctx.stop_word,
      ini_word: ctx.ini_word,
      fin_word: ctx.fin_word,
      env_word: ctx.env_word,
      lim_word: ctx.lim_word,
      ana_word: ctx.ana_word,
      evo_word: ctx.evo_word,
      epi_word: ctx.epi_word
    },
    sections: {
      anamnesis: NLP_ENABLED ? cleanTranscript(buffers.ANAMNESIS) : buffers.ANAMNESIS.trim(),
      evolucion: NLP_ENABLED ? cleanTranscript(buffers.EVOLUCION) : buffers.EVOLUCION.trim(),
      epicrisis: NLP_ENABLED ? cleanTranscript(buffers.EPICRISIS) : buffers.EPICRISIS.trim()
    },
    full_text: NLP_ENABLED ? cleanTranscript(fullTextRaw) : fullTextRaw.trim(),
    created_at: new Date().toISOString()
  };
}

function queueSubmit(){
  if(!canUseDictation()){
    window.location.replace("/static/medvoice-setup.html");
    return;
  }

  const text = ($("txt").value || "").trim();
  if(!text){
    setStatus('<span class="warn">no hay texto para enviar</span>', "chip-warn");
    return;
  }

  const payload = buildPayload();
  localStorage.setItem("medvoice.pending_payload", JSON.stringify(payload));
  setStatus('<span class="ok">preparando envío...</span>', "chip-ok");
  log("Payload preparado. Redirigiendo a envío SAP.");
  window.location.href = "/static/medvoice-submit.html";
}

$("btnToggle").addEventListener("click", ()=>{
  enableRecognitionByGesture();
  if(dictActive) stopDictation();
  else startDictation();
});

$("btnSend").addEventListener("click", ()=>{
  enableRecognitionByGesture();
  queueSubmit();
});

$("btnClear").addEventListener("click", ()=>{
  enableRecognitionByGesture();
  clearText();
});

const gifBtn   = $("mySissGifBtn");
const overlay  = $("mySissOverlay");
const modal    = $("mySissModal");
const closeBtn = $("mySissClose");
const micOrb   = $("mySissMic");

let gifOpen = false;
let gifListening = false;

function speakES(text){
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "es-CO";
    u.rate = 1.0;
    u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  }catch(_e){}
}

function openGif(){
  gifOpen = true;
  overlay.classList.add("show");
  overlay.setAttribute("aria-hidden", "false");
  speakES("Doctor, ¿qué información clínica del paciente necesita consultar?");
}

function closeGif(){
  gifOpen = false;
  overlay.classList.remove("show");
  overlay.setAttribute("aria-hidden", "true");
  modal.classList.remove("mysiss-listening");
  gifListening = false;
}

gifBtn.addEventListener("click", ()=>{
  enableRecognitionByGesture();
  openGif();
});

closeBtn.addEventListener("click", closeGif);
overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeGif(); });
document.addEventListener("keydown", (e)=>{ if(e.key === "Escape" && gifOpen) closeGif(); });

micOrb.addEventListener("click", ()=>{
  enableRecognitionByGesture();
  gifListening = !gifListening;
  if(gifListening){
    modal.classList.add("mysiss-listening");
    speakES("Listo. Hable ahora.");
  }else{
    modal.classList.remove("mysiss-listening");
  }
});

document.addEventListener("click", function once(){
  enableRecognitionByGesture();
  document.removeEventListener("click", once);
}, { once:true });

document.addEventListener("keydown", function onceKey(){
  enableRecognitionByGesture();
  document.removeEventListener("keydown", onceKey);
}, { once:true });

(async function init(){
  if(!voiceprint) return;
  voiceprintId = await ensureVoiceprintId(voiceprint);
  setStatus("listo.", "chip-warn");
  log("MedVoice listo.");
})();
</script>

</body>
</html>
