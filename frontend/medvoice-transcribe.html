<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Dictado</title>
  <style>
    :root{
      --sap-blue:#0a6ed1; --sap-blue-2:#0854a0; --bg:#f7f7f7; --card:#fff;
      --text:#1d2d3e; --muted:#6a6d70; --border:#d9d9d9;
      --ok:#107e3e; --warn:#e9730c; --err:#bb0000;
    }
    *{ box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    body{ margin:0; background:var(--bg); color:var(--text); }
    header{ background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2)); color:#fff; padding:18px 16px; }
    header h1{ margin:0; font-size:20px; }
    header p{ margin:6px 0 0; opacity:.92; font-size:13px; }

    .wrap{ max-width:1100px; margin:18px auto; padding:0 14px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; box-shadow:0 6px 20px rgba(0,0,0,.06); }
    .meta{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .meta .line{ color:var(--muted); font-size:14px; }
    .pill{ display:inline-flex; align-items:center; gap:8px; border:1px solid #cfe9d7; background:#eaf7ef; color:var(--ok); padding:6px 10px; border-radius:999px; font-size:12px; }

    .grid{ display:grid; grid-template-columns: 1fr; gap:14px; margin-top:14px; }
    .panel{ border:1px solid var(--border); border-radius:14px; padding:16px; background:#fff; }
    .panel h2{ margin:0 0 10px; font-size:18px; }
    .panel p{ margin:0 0 12px; color:var(--muted); font-size:13px; line-height:1.35; }

    .btns{ display:flex; gap:10px; flex-wrap:wrap; margin:10px 0; }
    button{ border:0; cursor:pointer; padding:10px 18px; border-radius:10px; font-weight:800; font-size:14px; }
    .btn-primary{ background:var(--sap-blue); color:#fff; }
    .btn-secondary{ background:#d3e7fb; color:#0b3c74; }

    .status{ margin-top:8px; font-size:13px; color:var(--muted); }
    .status .ok{ color:var(--ok); font-weight:900; }
    .status .err{ color:var(--err); font-weight:900; }

    .logwrap{ margin-top:14px; }
    .logtitle{ font-size:16px; font-weight:900; margin:0 0 8px; }
    .logbox{
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      background:#fff;
      height:200px;
      overflow:auto;
      font-family:ui-monospace,Menlo,Consolas,monospace;
      font-size:12.5px;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
<header>
  <h1>MedVoice | Dictado</h1>
  <p>Dictado clínico por voz y envío a transcripción.</p>
</header>

<div class="wrap">
  <div class="card">
    <div class="meta">
      <div class="line">
        <b>Paciente:</b> <span id="mPatnr">—</span>
        &nbsp; | &nbsp;
        <b>Episodio:</b> <span id="mFalnr">—</span>
        &nbsp; | &nbsp;
        <b>Campo:</b> <span id="mField">ANAMNESIS</span>
      </div>
      <span class="pill">Listo</span>
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Dictado</h2>
      <p>Presiona <b>Grabar</b>, habla con normalidad y luego presiona <b>Detener</b>. Se enviará a transcripción.</p>

      <div class="btns">
        <button id="btnRec" class="btn-primary">Grabar</button>
        <button id="btnSend" class="btn-secondary" disabled>Enviar</button>
      </div>

      <div class="status">
        Estado: <span id="st">listo.</span>
      </div>
    </div>
  </div>

  <div class="logwrap">
    <div class="logtitle">Log</div>
    <div id="logBox" class="logbox"></div>
  </div>
</div>

<script>
// --- Limpieza barra: mostrar SIEMPRE .../static/index.html (sin query)
(function () {
  const u = new URL(location.href);
  const indexUrl = u.origin + "/static/index.html";
  history.replaceState({}, document.title, indexUrl);
})();

function getCtx(){
  const u = new URL(location.href);
  const qs = u.searchParams;
  const get = (k)=> (sessionStorage.getItem("medvoice."+k)
                  || localStorage.getItem("medvoice."+k)
                  || (qs.get(k)||"")).trim();
  return {
    doctor_id: get("doctor_id"),
    api:       get("api") || "http://127.0.0.1:8000",
    field:     get("field") || "ANAMNESIS",
    patnr:     get("patnr") || "—",
    falnr:     get("falnr") || "—"
  };
}

const ctx = getCtx();
document.getElementById("mPatnr").textContent = ctx.patnr;
document.getElementById("mFalnr").textContent = ctx.falnr;
document.getElementById("mField").textContent = ctx.field;

const logBox = document.getElementById("logBox");
function log(m){
  const ts = new Date().toLocaleTimeString();
  logBox.textContent += `[${ts}] ${m}\n`;
  logBox.scrollTop = logBox.scrollHeight;
}
log("Dictado listo.");

const st = document.getElementById("st");
const btnRec = document.getElementById("btnRec");
const btnSend = document.getElementById("btnSend");

let stream=null, rec=null, chunks=[], lastBlob=null;

function stopStream(s){ try{ s && s.getTracks && s.getTracks().forEach(t=>t.stop()); }catch(e){} }

async function mic(){
  return await navigator.mediaDevices.getUserMedia({audio:true});
}

btnRec.addEventListener("click", async ()=>{
  if (rec && rec.state === "recording"){
    rec.stop();
    btnRec.textContent = "Grabar";
    st.textContent = "procesando…";
    return;
  }
  try{
    stream = await mic();
    chunks = [];
    rec = new MediaRecorder(stream);
    rec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
    rec.onstop = ()=>{
      stopStream(stream);
      lastBlob = new Blob(chunks, {type:"audio/webm"});
      btnSend.disabled = false;
      st.innerHTML = `<span class="ok">grabación lista.</span>`;
      log("Grabación detenida.");
    };
    rec.start();
    btnRec.textContent = "Detener";
    st.textContent = "grabando…";
    log("Grabación iniciada.");
  }catch(e){
    st.innerHTML = `<span class="err">no se pudo acceder al micrófono.</span>`;
    log("ERROR micrófono. Revisa permisos del navegador.");
  }
});

btnSend.addEventListener("click", async ()=>{
  if (!lastBlob){ return; }

  try{
    st.textContent = "enviando…";
    log("Enviando a transcripción…");

    const fd = new FormData();
    fd.append("file", lastBlob, "audio.webm");
    fd.append("doctor_id", ctx.doctor_id || "");
    fd.append("patnr", ctx.patnr || "");
    fd.append("falnr", ctx.falnr || "");
    fd.append("field", ctx.field || "");

    const r = await fetch(ctx.api.replace(/\/$/,"") + "/api/transcribe", {
      method: "POST",
      body: fd
    });

    if (!r.ok){
      const t = await r.text();
      throw new Error("HTTP " + r.status + " " + t);
    }

    const data = await r.json().catch(()=> ({}));
    st.innerHTML = `<span class="ok">transcripción recibida.</span>`;
    log("Transcripción OK.");

    // Si tu backend devuelve {text: "..."} lo registramos en log (sin mostrarlo en pantalla principal)
    if (data && data.text){
      log("Texto: " + data.text);
    }

  }catch(err){
    st.innerHTML = `<span class="err">error enviando a transcripción.</span>`;
    log("ERROR: " + (err && err.message ? err.message : String(err)));
  }
});
</script>
</body>
</html>
