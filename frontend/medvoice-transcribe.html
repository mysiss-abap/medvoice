<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Transcripción</title>
  <style>
    :root{
      --sap-blue:#0a6ed1; --sap-blue-2:#0854a0; --sap-bg:#f7f7f7; --sap-card:#fff;
      --sap-text:#1d2d3e; --sap-muted:#6a6d70; --sap-border:#d9d9d9;
      --ok:#107e3e; --warn:#e9730c; --err:#bb0000;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--sap-bg);font-family:Segoe UI, Arial, sans-serif;color:var(--sap-text);}

    /* ===== HEADER (como lo necesitas) ===== */
    header{
      background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));
      color:#fff;
      padding:14px 18px;
    }
    .head-row{
      display:grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items:center;
      gap:12px;
    }
    .app-name{font-size:22px;font-weight:800;line-height:1}
    .app-sub{font-size:13px;opacity:.95;margin-top:4px;font-weight:600}
    .patient-line{
      justify-self:center;
      font-size:14px;
      font-weight:700;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }
    @media (max-width: 900px){
      .head-row{grid-template-columns:1fr}
      .patient-line{justify-self:start;text-align:left}
    }

    .wrap{max-width:980px;margin:18px auto;padding:0 14px;}
    .card{
      background:var(--sap-card);
      border:1px solid var(--sap-border);
      border-radius:12px;
      box-shadow:0 1px 2px rgba(0,0,0,.05);
      padding:16px;
      margin-bottom:14px;
    }

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
    .small{font-size:12.5px;color:var(--sap-muted);line-height:1.35}
    .label{font-size:13px;color:var(--sap-muted)}
    .label b{color:var(--sap-text)}
    .chip{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--sap-border);
      background:#eef2f7;
      color:var(--sap-muted);
    }
    .chip-ok{background:#e7f4ec;color:var(--ok)}
    .chip-warn{background:#fff3e0;color:var(--warn)}
    .chip-err{background:#fde8ea;color:var(--err)}

    .btns{display:flex;gap:10px;flex-wrap:wrap;}
    .btn{
      border:1px solid var(--sap-blue);
      background:var(--sap-blue);
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
      transition:.15s;
      user-select:none;
      font-weight:900;
    }
    .btn:hover{filter:brightness(.95);}
    .btn:disabled{opacity:.55;cursor:not-allowed;}
    .btn-ghost{background:#fff;color:var(--sap-blue);border-color:var(--sap-blue);}
    .btn-warn{background:var(--warn);border-color:var(--warn);}

    .status{margin-top:10px;font-size:13px;color:var(--sap-muted);}
    .ok{color:var(--ok);font-weight:900}
    .warn{color:var(--warn);font-weight:900}
    .err{color:var(--err);font-weight:900}

    /* ===== Textarea con scroll interno (sin dañar el contenedor) ===== */
    textarea{
      border:1px solid var(--sap-border);
      border-radius:10px;
      padding:12px 12px;
      font-size:14px;
      outline:none;
      background:#fff;
      width:100%;
      height:320px;            /* fijo para que no rompa el layout */
      resize:none;             /* evita que “saque” el borde */
      line-height:1.45;
      overflow:auto;
    }
    textarea:focus{border-color:var(--sap-blue);}

    /* ===== Log con scroll interno ===== */
    .mono{font-family:Consolas, ui-monospace, Menlo, monospace;font-size:12px;white-space:pre-wrap;}
    #log{
      border:1px solid var(--sap-border);
      border-radius:12px;
      padding:12px;
      background:#fff;
      height:180px;
      overflow:auto;
    }

    /* ==== mySiss Voice Assistant (GIF + popup sin texto) ==== */
    .mysiss-gif-btn{
      position:fixed; right:18px; bottom:18px;
      width:86px; height:86px; border-radius:26px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none;
      z-index:9999;
      backdrop-filter: blur(10px);
      transition: transform .12s ease;
    }
    .mysiss-gif-btn:active{ transform: scale(.98); }
    .mysiss-gif-btn img{
      width:72px; height:72px; object-fit:contain;
      border-radius:20px; display:block;
    }
    .mysiss-overlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:flex-end; justify-content:flex-end;
      padding:18px;
      z-index:9998;
    }
    .mysiss-overlay.show{ display:flex; }
    .mysiss-modal{
      width:min(420px, 100%);
      height:min(240px, 60vh);
      border-radius:22px;
      background: rgba(12,16,28,.55);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      backdrop-filter: blur(14px);
      display:flex; align-items:center; justify-content:center;
      position:relative;
      overflow:hidden;
    }
    .mysiss-close{
      position:absolute; top:12px; right:12px;
      width:40px; height:40px; border-radius:14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      cursor:pointer;
    }
    .mysiss-close::before, .mysiss-close::after{
      content:"";
      position:absolute; top:50%; left:50%;
      width:18px; height:2px;
      background: rgba(255,255,255,.80);
      transform-origin:center;
    }
    .mysiss-close::before{ transform: translate(-50%,-50%) rotate(45deg); }
    .mysiss-close::after{  transform: translate(-50%,-50%) rotate(-45deg); }

    .mysiss-mic-orb{
      width:120px; height:120px; border-radius:999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      cursor:pointer;
      position:relative;
      display:grid; place-items:center;
      overflow:hidden;
    }
    .mysiss-mic-core{
      width:24px; height:24px; border-radius:999px;
      background: rgba(124,58,237,.9);
      box-shadow: 0 0 0 10px rgba(124,58,237,.14);
    }
    .mysiss-mic-ring{
      position:absolute; inset:-30px;
      border-radius:999px;
      border: 2px solid rgba(124,58,237,.0);
      pointer-events:none;
    }
    .mysiss-listening .mysiss-mic-core{
      box-shadow: 0 0 0 14px rgba(124,58,237,.18);
      animation: mysissPulse 1.1s infinite;
    }
    .mysiss-listening .mysiss-mic-ring{
      border-color: rgba(124,58,237,.20);
      animation: mysissRing 1.1s infinite;
    }
    @keyframes mysissPulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes mysissRing{0%{transform:scale(.92);opacity:.25}70%{transform:scale(1.06);opacity:0}100%{transform:scale(1.06);opacity:0}}
    @media (max-width:520px){
      .mysiss-overlay{ justify-content:center; }
      .mysiss-gif-btn{ right:14px; bottom:14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="head-row">
    <div>
      <div class="app-name">MedVoice</div>
      <div class="app-sub">Transcripción</div>
    </div>
    <div class="patient-line" id="patientLine">Paciente — | Episodio — | ANAMNESIS</div>
    <div></div>
  </div>
  <div class="patient-line" id="patientLine">Paciente - (-) | Episodio - (adm -) | Ubicación - | ANAMNESIS</div>
  <div></div>
</header>

<div class="wrap">

  <div class="card">
    <div class="row">
      <div class="label">
        <b>Médico:</b> <span id="doctorLbl">—</span>
        &nbsp; | &nbsp;
        <b>Campo:</b> <span id="fieldLbl">ANAMNESIS</span>
      </div>
      <div class="chip chip-warn" id="modeChip">Listo</div>
    </div>
    <!-- FUTURO (SAP): nombre médico, datos paciente completos, ubicación, etc -->
    <!-- <div id="headerExtra" class="small" style="margin-top:10px"></div> -->
  </div>

  <div class="card">
    <div class="btns">
      <button class="btn" id="btnToggle">Iniciar transcripción</button>
      <button class="btn btn-warn" id="btnSend">Enviar a SAP</button>
      <button class="btn btn-ghost" id="btnClear">Limpiar</button>
    </div>

    <div class="status" id="status">Estado: listo.</div>

    <div style="margin-top:12px">
      <textarea id="txt" placeholder="Aquí aparecerá la transcripción..."></textarea>
    </div>
  </div>
</div>

<!-- mySiss Voice Assistant (GIF floating) -->
<div id="mySissGifBtn" class="mysiss-gif-btn" aria-label="mySiss Assistant">
  <img src="src/img/mySiss_Gif.gif" alt="mySiss Assistant">
</div>

<!-- Popup emergente (sin texto visible) -->
<div id="mySissOverlay" class="mysiss-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="mysiss-modal" id="mySissModal">
    <button class="mysiss-close" id="mySissClose" aria-label="Cerrar"></button>

  <div class="card">
    <h3 style="margin:0 0 10px 0;font-size:16px;">Log</h3>
    <div class="mono" id="log"></div>
  </div>

</div>

<!-- mySiss Voice Assistant (GIF floating) -->
<div id="mySissGifBtn" class="mysiss-gif-btn" aria-label="mySiss Assistant">
  <img src="src/img/mySiss_Gif.gif" alt="mySiss Assistant">
</div>

<!-- Popup emergente (sin texto visible) -->
<div id="mySissOverlay" class="mysiss-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="mysiss-modal" id="mySissModal">
    <button class="mysiss-close" id="mySissClose" aria-label="Cerrar"></button>
    <button class="mysiss-mic-orb" id="mySissMic" aria-label="Hablar">
      <span class="mysiss-mic-core"></span>
      <span class="mysiss-mic-ring"></span>
    </button>
  </div>
</div>

<script>
/* ============================================================================
   MedVoice Transcribe (estable, sin pantallazo en blanco)
   - Lee params de SAP
   - Guarda en session/local (medvoice.*)
   - Oculta querystring en la barra
   - Comandos de voz:
       GIF: wake_word / stop_word
       Dictado: ini_word / fin_word / env_word
   - Dictado usa SpeechRecognition (sin backend, no BD). Guarda en localStorage.
   - Enviar a SAP por sapevent: MEDVOICE_SET_FIELD
============================================================================ */

(function hideUrlBarButKeepParams(){
  // 1) Guardar params antes de ocultar
  const u = new URL(window.location.href);
  const sp = u.searchParams;

  const keys = [
    "doctor_id","doctor_name","field",
    "patnr","falnr",
    "wake_word","stop_word",
    "ini_word","fin_word","env_word"
  ];

  keys.forEach(k=>{
    const v = (sp.get(k) || "").trim();
    if(v){
      sessionStorage.setItem("medvoice."+k, v);
      localStorage.setItem("medvoice."+k, v);
    }
  });

  // 2) Ocultar querystring en barra
  try{
    history.replaceState({}, document.title, "/static/medvoice-transcribe.html");
  }catch(_e){}
})();

const $ = (id)=>document.getElementById(id);
const log = (m)=>{
  const el=$("log");
  el.textContent += `[${new Date().toLocaleTimeString()}] ${m}\n`;
  el.scrollTop = el.scrollHeight;
};

function getValue(key, fallback=""){
  const a = (sessionStorage.getItem("medvoice."+key) || "").trim();
  const b = (localStorage.getItem("medvoice."+key) || "").trim();
  return a || b || fallback;
}

function norm(s){
  return String(s||"")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g," ")
    .replace(/\s+/g," ")
    .trim();
}

const ctx = {
  doctor_id   : getValue("doctor_id",""),
  doctor_name : getValue("doctor_name",""),
  field       : getValue("field","ANAMNESIS"),
  patnr       : getValue("patnr","—"),
  falnr       : getValue("falnr","—"),

  // GIF assistant
  wake_word   : getValue("wake_word","MAISIS"),
  stop_word   : getValue("stop_word","APAGAR"),

  // Dictado (transcripción)
  ini_word    : getValue("ini_word","INICIAR"),
  fin_word    : getValue("fin_word","FIN"),
  env_word    : getValue("env_word","ENVIAR"),
};

function fieldLabelOnly(v){
  const t = String(v||"").toUpperCase();
  if(t.includes("ANAM")) return "ANAMNESIS";
  return t || "ANAMNESIS";
}

$("fieldLbl").textContent = fieldLabelOnly(ctx.field);
$("patientLine").textContent = `Paciente ${ctx.patnr} | Episodio ${ctx.falnr} | ${fieldLabelOnly(ctx.field)}`;

const doctorShown = ctx.doctor_name
  ? `${ctx.doctor_id} | ${ctx.doctor_name}`
  : (ctx.doctor_id || "—");

$("doctorLbl").textContent = doctorShown;

function setStatus(html, chipClass){
  $("status").innerHTML = "Estado: " + html;
  const chip = $("modeChip");
  chip.className = "chip " + (chipClass || "chip-warn");
}

/* =========================
   Dictation (SpeechRecognition)
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

let dictRec = null;
let dictActive = false;

function ensureSpeechSupport(){
  if(!SR){
    setStatus('<span class="err">este navegador no soporta SpeechRecognition</span>', "chip-err");
    return false;
  }
  return true;
}

function startDictation(){
  if(!ensureSpeechSupport()) return;

  if(dictActive) return;
  dictActive = true;

  $("btnToggle").textContent = "Terminar transcripción";
  setStatus('<span class="ok">escuchando...</span>', "chip-ok");

  const rec = new SR();
  dictRec = rec;
  rec.lang = "es-CO";
  rec.continuous = true;
  rec.interimResults = true;

  let finalText = $("txt").value || "";
  let lastInterim = "";

  rec.onresult = (event)=>{
    let interim = "";
    for(let i=event.resultIndex;i<event.results.length;i++){
      const r = event.results[i];
      const t = (r[0] && r[0].transcript) ? r[0].transcript : "";
      if(r.isFinal) finalText += (t.trim() ? (t.trim()+" ") : "");
      else interim += t;
    }
    lastInterim = interim;
    $("txt").value = (finalText + (interim ? "\n" + interim.trim() : "")).trim();

    // Persistir (solo texto)
    localStorage.setItem("medvoice.last_transcript_text", $("txt").value);
  };

  rec.onerror = ()=>{
    // NO spamear log (tú no quieres “reiniciando…”)
    // Solo si realmente estaba activo, marcamos advertencia silenciosa
    if(dictActive) setStatus('<span class="warn">esperando audio...</span>', "chip-warn");
  };

  rec.onend = ()=>{
    // Si seguía activo, reintenta sin escribir ruido en log
    if(dictActive){
      try{ rec.start(); }catch(_e){}
    }
  };

  try{ rec.start(); }catch(_e){}

  log(`Transcripción iniciada (por botón o palabra "${ctx.ini_word}").`);
}

function stopDictation(){
  if(!dictActive) return;
  dictActive = false;

  $("btnToggle").textContent = "Iniciar transcripción";
  setStatus('<span class="ok">lista</span>', "chip-ok");

  try{ dictRec && dictRec.stop(); }catch(_e){}
  dictRec = null;

  localStorage.setItem("medvoice.last_transcript_text", $("txt").value || "");
  log(`Transcripción detenida (por botón o palabra "${ctx.fin_word}").`);
}

function clearText(){
  $("txt").value = "";
  localStorage.removeItem("medvoice.last_transcript_text");
  setStatus("listo.", "chip-warn");
  log("Texto limpiado.");
}

/* =========================
   Enviar a SAP (sapevent)
function sendToSAP(){
  const text = ($("txt").value || "").trim();
  if(!text){
    setStatus('<span class="warn">no hay texto para enviar</span>', "chip-warn");
    return;
  }

  // Guarda local siempre
  localStorage.setItem("medvoice.last_transcript_text", text);

  const target = fieldLabelOnly(ctx.field); // tú decides si SAP usa este label o un target técnico
  const url = "sapevent:MEDVOICE_SET_FIELD"
    + "?target=" + encodeURIComponent(target)
    + "&text=" + encodeURIComponent(text);

  try{
    window.location.href = url;
    log("Enviado a SAP por sapevent.");
    setStatus('<span class="ok">enviado a SAP</span>', "chip-ok");
  }catch(_e){
    // Fallback: no rompe demo
    setStatus('<span class="warn">sapevent no disponible (abre embebido en SAP)</span>', "chip-warn");
    log("sapevent no disponible en este navegador.");
  }
}

/* =========================
   UI Buttons
$("btnToggle").addEventListener("click", ()=>{
  if(dictActive) stopDictation();
  else startDictation();
});

$("btnSend").addEventListener("click", sendToSAP);
$("btnClear").addEventListener("click", clearText);

// Restaurar último texto si existía
const last = (localStorage.getItem("medvoice.last_transcript_text") || "").trim();
if(last) $("txt").value = last;

/* =========================
   mySiss GIF Assistant (NO log)
   - Activar: wake_word
   - Parar: stop_word
const gifBtn   = $("mySissGifBtn");
const overlay  = $("mySissOverlay");
const modal    = $("mySissModal");
const closeBtn = $("mySissClose");
const micOrb   = $("mySissMic");

let gifOpen = false;
let gifListening = false;
let gifRec = null;

function speakES(text){
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "es-CO";
    u.rate = 1.0;
    u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  }catch(_e){}
}

function openGif(){
  gifOpen = true;
  overlay.classList.add("show");
  overlay.setAttribute("aria-hidden","false");
  // NO log
  speakES("Doctor, ¿qué información clínica del paciente necesita consultar?");
}

function closeGif(){
  gifOpen = false;
  overlay.classList.remove("show");
  overlay.setAttribute("aria-hidden","true");
  stopGifListening();
}

function initGifRec(){
  if(!SR) return null;
  const r = new SR();
  r.lang = "es-CO";
  r.interimResults = false;
  r.continuous = false;

  r.onstart = ()=>{
    gifListening = true;
    modal.classList.add("mysiss-listening");
  };
  r.onerror = ()=>{
    gifListening = false;
    modal.classList.remove("mysiss-listening");
    speakES("No tengo acceso al micrófono. Por favor habilite el permiso del navegador e intente de nuevo.");
  };
  r.onend = ()=>{
    gifListening = false;
    modal.classList.remove("mysiss-listening");
  };
  r.onresult = (event)=>{
    const said = (event.results?.[0]?.[0]?.transcript || "").trim();
    if(!said) return;
    respondToQueryByVoice(said);
  };
  return r;
}

function startGifListening(){
  if(!SR){
    speakES("Este navegador no soporta dictado por voz.");
    return;
  }
  if(!gifRec) gifRec = initGifRec();
  if(!gifRec) return;
  try{ gifRec.start(); }catch(_e){}
}

function stopGifListening(){
  if(gifRec && gifListening){
    try{ gifRec.stop(); }catch(_e){}
  }
}

function respondToQueryByVoice(query){
  const q = norm(query);

  // DEMO (queda lista para conectar a SAP después)
  if(q.includes("hemograma") || q.includes("cuadro hematico") || q.includes("cbc")){
    speakES("Entendido. Consultando el hemograma más reciente. En este prototipo, la respuesta es simulada.");
    return;
  }
  if(q.includes("alerg")){
    speakES("Entendido. Consultando alergias registradas. En este prototipo, la respuesta es simulada.");
    return;
  }
  if(q.includes("diagnost") || q.includes("dx")){
    speakES("Entendido. Consultando diagnósticos activos. En este prototipo, la respuesta es simulada.");
    return;
  }
  if(q.includes("medic") || q.includes("tratam")){
    speakES("Entendido. Consultando medicación y tratamiento actual. En este prototipo, la respuesta es simulada.");
    return;
  }

  speakES("Recibido. Confirmo la consulta solicitada. En este prototipo la respuesta es simulada, quedará lista para integración con SAP.");
}

/* UI gif */
gifBtn.addEventListener("click", openGif);
closeBtn.addEventListener("click", closeGif);
overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeGif(); });
micOrb.addEventListener("click", ()=>{ if(gifListening) stopGifListening(); else startGifListening(); });
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape" && gifOpen) closeGif(); });

/* =========================
   Global Voice Command Listener (wake/stop/ini/fin/env)
   - NO escribe log para GIF
   - Sí escribe log para dictado (solo cuando cambia estado)
let cmdRec = null;
let cmdEnabled = false;
let lastCmdAt = 0;

function startCommandLoop(){
  if(!SR) return;

  cmdRec = new SR();
  cmdRec.lang = "es-CO";
  cmdRec.continuous = true;
  cmdRec.interimResults = true;

  const WAKE = norm(ctx.wake_word);
  const STOP = norm(ctx.stop_word);
  const INI  = norm(ctx.ini_word);
  const FIN  = norm(ctx.fin_word);
  const ENV  = norm(ctx.env_word);

  cmdRec.onresult = (event)=>{
    let phrase = "";
    for(let i=event.resultIndex;i<event.results.length;i++){
      phrase += " " + ((event.results[i][0] && event.results[i][0].transcript) ? event.results[i][0].transcript : "");
    }
    const t = norm(phrase);
    if(!t) return;

    const now = Date.now();
    if(now - lastCmdAt < 900) return;

    // GIF assistant commands (NO log)
    if(!gifOpen && WAKE && t.includes(WAKE)){
      lastCmdAt = now;
      openGif();
      return;
    }
    if(gifOpen && STOP && t.includes(STOP)){
      lastCmdAt = now;
      closeGif();
      return;
    }

    // Dictation commands
    if(!dictActive && INI && t.includes(INI)){
      lastCmdAt = now;
      startDictation();
      return;
    }
    if(dictActive && FIN && t.includes(FIN)){
      lastCmdAt = now;
      stopDictation();
      return;
    }
    if(ENV && t.includes(ENV)){
      // permitir enviar incluso si dictado está apagado
      lastCmdAt = now;
      sendToSAP();
      return;
    }
  };

  cmdRec.onend = ()=>{
    if(cmdEnabled){
      try{ cmdRec.start(); }catch(_e){}
    }
  };

  cmdRec.onerror = ()=>{ /* silencioso */ };

  cmdEnabled = true;
  try{ cmdRec.start(); }catch(_e){}
}

startCommandLoop();

// Estado inicial bonito
setStatus("listo.", "chip-warn");
</script>
