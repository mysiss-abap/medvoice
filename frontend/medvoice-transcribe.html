<script>
/* =========================================================
   MedVoice | Transcribe (stable script)
   - ONE SpeechRecognition instance (commands)
   - Dictation via MediaRecorder -> /api/transcribe
   - Store transcript in localStorage
   - Send to SAP via /api/push_result (or sapevent fallback commented)
   ========================================================= */

(function () {
  // Keep URL clean (no querystring visible)
  try { history.replaceState({}, document.title, "/static/medvoice-transcribe.html"); } catch(_) {}

  const $ = (id) => document.getElementById(id);

  // --------- Ensure required UI nodes exist ----------
  // Status line
  let st = $("st");
  if (!st) {
    st = document.createElement("div");
    st.id = "st";
    st.className = "status";
    st.textContent = "listo.";
    const panel = document.querySelector(".panel");
    panel && panel.appendChild(st);
  }

  // Textarea for transcript
  let txt = $("txt");
  if (!txt) {
    txt = document.createElement("textarea");
    txt.id = "txt";
    txt.placeholder = "Aquí aparecerá la transcripción…";
    txt.style.width = "100%";
    txt.style.height = "280px";
    txt.style.border = "1px solid var(--border)";
    txt.style.borderRadius = "12px";
    txt.style.padding = "12px";
    txt.style.fontFamily = "ui-monospace, Menlo, Consolas, monospace";
    txt.style.fontSize = "13px";
    txt.style.resize = "vertical";
    const panel = document.querySelector(".panel");
    panel && panel.appendChild(txt);
  }

  // Log box (scroll only inside)
  let logBox = $("logBox");
  if (!logBox) {
    const card = $("dictationLogCard");
    if (card) {
      logBox = document.createElement("div");
      logBox.id = "logBox";
      logBox.className = "logbox";
      card.style.display = "block";
      card.appendChild(logBox);
    }
  }

  function normalizeText(v) {
    return String(v || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function getValue(key, fallback = "") {
    const fromSession = (sessionStorage.getItem("medvoice." + key) || "").trim();
    const fromLocal = (localStorage.getItem("medvoice." + key) || "").trim();
    const fromQuery = (new URL(window.location.href).searchParams.get(key) || "").trim();
    return fromSession || fromLocal || fromQuery || fallback;
  }

  // --------- Context from SAP/local ----------
  const ctx = {
    doctor_id: getValue("doctor_id"),
    doctor_name: getValue("doctor_name", ""),       // future from SAP header
    api: getValue("api", window.location.origin),
    field: getValue("field", "ANAMNESIS"),
    field_label: getValue("field_label", "ANAMNESIS"),
    patnr: getValue("patnr", ""),
    falnr: getValue("falnr", ""),
    wake_word: getValue("wake_word", "mysiss"),
    wake_alias: getValue("wake_alias", ""),         // e.g. "maisis"
    stop_word: getValue("stop_word", "apagar"),
    ini_word: getValue("ini_word", "iniciar"),
    fin_word: getValue("fin_word", "fin"),
    env_word: getValue("env_word", "enviar"),

    // Optional header data (future):
    patient_name: getValue("patient_name", ""),
    patient_doc: getValue("patient_doc", ""),
    adm_date_txt: getValue("adm_date_txt", ""),
    location_line: getValue("location_line", "")
  };

  // --------- Header render ----------
  const patientLine = $("patientLine");
  if (patientLine) {
    const f = (ctx.field_label || ctx.field || "ANAMNESIS");
    patientLine.textContent = `Paciente ${ctx.patnr || "por confirmar"} | Episodio ${ctx.falnr || "por confirmar"} | Campo: ${f}`;
  }

  const doctorView = $("doctorView");
  if (doctorView) {
    doctorView.textContent = (ctx.doctor_name || ctx.doctor_id || "No informado");
  }
  const fieldView = $("fieldView");
  if (fieldView) {
    fieldView.textContent = (ctx.field_label || ctx.field || "ANAMNESIS");
  }

  const doctorChip = $("doctorChip");
  if (doctorChip) {
    if (ctx.doctor_id || ctx.doctor_name) {
      doctorChip.textContent = "Médico identificado";
      doctorChip.className = "okchip";
    } else {
      doctorChip.textContent = "Falta identificar médico";
      doctorChip.className = "chip";
    }
  }

  // --------- Logging (DICTATION only) ----------
  const MODE = { IDLE: "IDLE", GIF: "GIF", DICT: "DICT" };
  let mode = MODE.IDLE;
  let dictationStartedOnce = false;

  function log(msg) {
    if (!logBox) return;
    // Do NOT log GIF assistant interactions:
    if (mode !== MODE.DICT) return;
    if (!dictationStartedOnce) return;

    logBox.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
    logBox.scrollTop = logBox.scrollHeight;
    $("dictationLogCard") && ($("dictationLogCard").style.display = "block");
  }

  function setStatus(html) {
    st.innerHTML = html;
  }

  function micBlockedMessage() {
    setStatus('<span class="err">No hay acceso al micrófono. Habilite permiso del navegador para este sitio.</span>');
  }

  function stopStream(stream) {
    try { stream && stream.getTracks && stream.getTracks().forEach(t => t.stop()); } catch(_) {}
  }

  // --------- Dictation recording ----------
  const btnToggle = $("btnToggle");
  const btnSend = $("btnSend");
  const btnClear = $("btnClear");

  let rec = null;
  let stream = null;
  let chunks = [];
  let isRecording = false;

  async function startDictation() {
    if (isRecording) return;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return micBlockedMessage();

    mode = MODE.DICT;
    dictationStartedOnce = true;

    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      rec = new MediaRecorder(stream);
      rec.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
      rec.onstop = async () => {
        stopStream(stream);
        stream = null;
        isRecording = false;
        btnToggle && (btnToggle.textContent = "Iniciar transcripción");
        setStatus('<span class="ok">procesando…</span>');
        log("Finalizando transcripción…");

        const audioBlob = new Blob(chunks, { type: rec.mimeType || "audio/webm" });
        await transcribe(audioBlob);
      };

      rec.start();
      isRecording = true;
      btnToggle && (btnToggle.textContent = "Terminar transcripción");
      setStatus('<span class="ok">escuchando…</span>');
      log("Transcripción iniciada.");
    } catch (e) {
      mode = MODE.IDLE;
      micBlockedMessage();
    }
  }

  async function stopDictation() {
    if (!isRecording || !rec) return;
    setStatus('<span class="ok">deteniendo…</span>');
    try { rec.stop(); } catch(_) {}
  }

  async function transcribe(blob) {
    const endpoint = ctx.api.replace(/\/$/, "") + "/api/transcribe";
    const fd = new FormData();
    fd.append("doctor_id", ctx.doctor_id || "");
    fd.append("audio", blob, "dictation.webm");
    fd.append("target_field", ctx.field || "");

    try {
      setStatus('<span class="ok">transcribiendo…</span>');
      log(`POST ${endpoint}`);

      const res = await fetch(endpoint, { method: "POST", body: fd });
      if (!res.ok) throw new Error("HTTP " + res.status);

      const data = await res.json();
      const text = (data && data.text ? String(data.text) : "").trim();

      localStorage.setItem("medvoice.last_transcript_text", text);
      txt.value = text;

      setStatus(text ? '<span class="ok">transcripción lista.</span>' : '<span class="err">sin texto en respuesta.</span>');
      log(text ? "Transcripción lista." : "Respuesta sin texto.");
    } catch (e) {
      setStatus('<span class="err">No fue posible completar la transcripción.</span>');
      log("Error transcripción: " + (e.message || String(e)));
    } finally {
      // Back to idle after dictation finishes
      mode = MODE.IDLE;
    }
  }

  // --------- Send to SAP ----------
  async function sendToSAP(text) {
    const payload = {
      doctor_id: ctx.doctor_id || "",
      patnr: ctx.patnr || "",
      falnr: ctx.falnr || "",
      field: ctx.field || "",
      text: text || ""
    };

    // Option A: HTTP endpoint
    const endpoint = ctx.api.replace(/\/$/, "") + "/api/push_result";
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("HTTP " + res.status);

    // Option B (SAP GUI HTML Viewer fallback, keep commented)
    // window.location.href = "sapevent:MEDVOICE_DONE?text=" + encodeURIComponent(text || "");
  }

  // Buttons
  btnToggle && btnToggle.addEventListener("click", async () => {
    if (isRecording) await stopDictation();
    else await startDictation();
  });

  btnSend && btnSend.addEventListener("click", async () => {
    const text = (txt.value || localStorage.getItem("medvoice.last_transcript_text") || "").trim();
    if (!text) return setStatus('<span class="err">No hay texto para enviar.</span>');

    try {
      mode = MODE.DICT;
      dictationStartedOnce = true;

      setStatus('<span class="ok">enviando a SAP…</span>');
      log("Enviando a SAP…");
      await sendToSAP(text);
      setStatus('<span class="ok">resultado enviado.</span>');
      log("Resultado enviado.");
    } catch (e) {
      setStatus('<span class="err">No fue posible enviar a SAP.</span>');
      log("Error envío: " + (e.message || String(e)));
    } finally {
      mode = MODE.IDLE;
    }
  });

  btnClear && btnClear.addEventListener("click", () => {
    txt.value = "";
    localStorage.removeItem("medvoice.last_transcript_text");
    setStatus('<span class="ok">listo.</span>');
    if (mode === MODE.DICT) log("Texto limpiado.");
  });

  // --------- GIF Assistant (no logs) ----------
  const gifBtn = $("mySissGifBtn");
  const overlay = $("mySissOverlay");
  const closeBtn = $("mySissClose");
  const micBtn = $("mySissMic");

  function openGif() {
    mode = MODE.GIF;
    if (!overlay) return;
    overlay.classList.add("show");
    overlay.setAttribute("aria-hidden", "false");
  }

  function closeGif() {
    mode = MODE.IDLE;
    if (!overlay) return;
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden", "true");
  }

  gifBtn && gifBtn.addEventListener("click", openGif);
  closeBtn && closeBtn.addEventListener("click", closeGif);
  overlay && overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeGif();
  });

  // --------- ONE SpeechRecognition (commands) ----------
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let commandRec = null;
  let commandLoop = false;
  let lastCmdTs = 0;

  const nWake = normalizeText(ctx.wake_word);
  const nWakeAlias = normalizeText(ctx.wake_alias);
  const nStop = normalizeText(ctx.stop_word);
  const nIni  = normalizeText(ctx.ini_word);
  const nFin  = normalizeText(ctx.fin_word);
  const nEnv  = normalizeText(ctx.env_word);

  function phraseHas(phrase, token) {
    return token && phrase.includes(token);
  }

  function handleCommand(phraseRaw) {
    const phrase = normalizeText(phraseRaw);
    if (!phrase) return;

    const now = Date.now();
    if (now - lastCmdTs < 900) return;

    const wakeDetected = phraseHas(phrase, nWake) || phraseHas(phrase, nWakeAlias);
    const stopDetected = phraseHas(phrase, nStop);

    const iniDetected = phraseHas(phrase, nIni);
    const finDetected = phraseHas(phrase, nFin);
    const envDetected = phraseHas(phrase, nEnv);

    // GIF assistant: wake/stop
    if (mode === MODE.IDLE && wakeDetected) {
      lastCmdTs = now;
      openGif();
      return;
    }
    if (mode === MODE.GIF && stopDetected) {
      lastCmdTs = now;
      closeGif();
      return;
    }

    // Dictation: iniciar/fin/enviar
    if (!isRecording && iniDetected) {
      lastCmdTs = now;
      startDictation();
      return;
    }
    if (isRecording && finDetected) {
      lastCmdTs = now;
      stopDictation();
      return;
    }
    if (!isRecording && envDetected) {
      lastCmdTs = now;
      const text = (txt.value || localStorage.getItem("medvoice.last_transcript_text") || "").trim();
      if (text) btnSend && btnSend.click();
      return;
    }
  }

  function startCommandLoop() {
    if (!SR) return; // browser without SpeechRecognition

    commandRec = new SR();
    commandRec.lang = "es-ES";
    commandRec.continuous = true;
    commandRec.interimResults = true;

    commandRec.onresult = (ev) => {
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const t = ev.results[i][0] && ev.results[i][0].transcript;
        if (t) handleCommand(t);
      }
    };

    commandRec.onerror = () => {
      // Do not spam logs; only restart silently
    };

    commandRec.onend = () => {
      if (commandLoop) {
        try { commandRec.start(); } catch(_) {}
      }
    };

    commandLoop = true;
    try { commandRec.start(); } catch(_) {}
  }

  // Optional: tap mic orb = request permission / start command loop
  micBtn && micBtn.addEventListener("click", async () => {
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
      stopStream(stream);
      startCommandLoop();
    } catch(_) {
      // no UI spam
    }
  });

  // Start command loop automatically (silently)
  startCommandLoop();

  // Load last transcript
  const last = localStorage.getItem("medvoice.last_transcript_text") || "";
  if (last) txt.value = last;

  setStatus('<span class="ok">listo.</span>');
})();
</script>
