<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Transcripción</title>
  <style>
    :root{
      --sap-blue:#0a6ed1; --sap-blue-2:#0854a0; --sap-bg:#f7f7f7; --sap-card:#fff;
      --sap-text:#1d2d3e; --sap-muted:#6a6d70; --sap-border:#d9d9d9;
      --ok:#107e3e; --warn:#e9730c; --err:#bb0000;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--sap-bg);
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--sap-text);
      overflow:hidden; /* NO scroll del browser */
    }

    header{
      background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));
      color:#fff;
      padding:14px 18px;
      position:relative;
    }

    /* Top header row: left brand + center patient */
    .head-top{
      display:flex;
      align-items:flex-start;
      gap:12px;
    }
    .head-left{
      min-width:220px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }
    .app-name{font-size:22px;font-weight:800;line-height:1}
    .app-sub{font-size:13px;opacity:.95;margin-top:4px;font-weight:600}

    .head-center{
      flex:1;
      display:flex;
      justify-content:center;
    }
    /* Transparent center block (no box) */
    .head-center-lines{
      max-width:980px;
      width:100%;
      text-align:center;
      margin-top:2px;
      display:flex;
      flex-direction:column;
      gap:6px;
      padding:0 10px;
    }
    .head-line{
      font-size:13.5px;
      font-weight:800;
      opacity:.98;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .wrap{
      max-width:980px;
      margin:18px auto;
      padding:0 14px;
      height:calc(100vh - 86px); /* header aprox */
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      background:var(--sap-card);
      border:1px solid var(--sap-border);
      border-radius:12px;
      box-shadow:0 1px 2px rgba(0,0,0,.05);
      padding:16px;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .label{font-size:14px;color:var(--sap-muted);line-height:1.5}
    .label b{color:var(--sap-text)}

    .chip{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      border:1px solid var(--sap-border);
      background:#eef2f7;
      color:var(--sap-muted);
    }
    .chip-ok{background:#e7f4ec;color:var(--ok)}
    .chip-warn{background:#fff3e0;color:var(--warn)}
    .chip-err{background:#fde8ea;color:var(--err)}

    .btns{display:flex;gap:10px;flex-wrap:wrap;}
    .btn{
      border:1px solid var(--sap-blue);
      background:var(--sap-blue);
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
      transition:.15s;
      user-select:none;
      font-weight:900;
    }
    .btn:hover{filter:brightness(.95);}
    .btn:disabled{opacity:.55;cursor:not-allowed;}
    .btn-ghost{background:#fff;color:var(--sap-blue);border-color:var(--sap-blue);}
    .btn-warn{background:var(--warn);border-color:var(--warn);}

    .status{margin-top:10px;font-size:13px;color:var(--sap-muted);}
    .ok{color:var(--ok);font-weight:900}
    .warn{color:var(--warn);font-weight:900}
    .err{color:var(--err);font-weight:900}

    textarea{
      border:1px solid var(--sap-border);
      border-radius:10px;
      padding:12px 12px;
      font-size:14px;
      outline:none;
      background:#fff;
      width:100%;
      height:320px;
      resize:none;
      line-height:1.45;
      overflow:auto;
      white-space:pre-wrap; /* para que los ENTER se vean bien */
    }
    textarea:focus{border-color:var(--sap-blue);}

    /* Log con scroll propio */
    .logcard{flex:1;min-height:0;display:flex;flex-direction:column}
    .mono{font-family:Consolas, ui-monospace, Menlo, monospace;font-size:12px;white-space:pre-wrap;}
    #log{
      flex:1;
      min-height:0;
      border:1px solid var(--sap-border);
      border-radius:12px;
      padding:12px;
      background:#fff;
      overflow:auto;
    }

    /* mySiss GIF floating */
    .mysiss-gif-btn{
      position:fixed; right:18px; bottom:18px;
      width:86px; height:86px; border-radius:26px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none;
      z-index:9999;
      backdrop-filter: blur(10px);
      transition: transform .12s ease;
    }
    .mysiss-gif-btn:active{ transform: scale(.98); }
    .mysiss-gif-btn img{
      width:72px; height:72px; object-fit:contain;
      border-radius:20px; display:block;
    }
    .mysiss-overlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:flex-end; justify-content:flex-end;
      padding:18px;
      z-index:9998;
    }
    .mysiss-overlay.show{ display:flex; }
    .mysiss-modal{
      width:min(420px, 100%);
      height:min(240px, 60vh);
      border-radius:22px;
      background: rgba(12,16,28,.55);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      backdrop-filter: blur(14px);
      display:flex; align-items:center; justify-content:center;
      position:relative;
      overflow:hidden;
    }
    .mysiss-close{
      position:absolute; top:12px; right:12px;
      width:40px; height:40px; border-radius:14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      cursor:pointer;
    }
    .mysiss-close::before, .mysiss-close::after{
      content:"";
      position:absolute; top:50%; left:50%;
      width:18px; height:2px;
      background: rgba(255,255,255,.80);
      transform-origin:center;
    }
    .mysiss-close::before{ transform: translate(-50%,-50%) rotate(45deg); }
    .mysiss-close::after{  transform: translate(-50%,-50%) rotate(-45deg); }

    .mysiss-mic-orb{
      width:120px; height:120px; border-radius:999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      cursor:pointer;
      position:relative;
      display:grid; place-items:center;
      overflow:hidden;
    }
    .mysiss-mic-core{
      width:24px; height:24px; border-radius:999px;
      background: rgba(124,58,237,.9);
      box-shadow: 0 0 0 10px rgba(124,58,237,.14);
    }
    .mysiss-mic-ring{
      position:absolute; inset:-30px;
      border-radius:999px;
      border: 2px solid rgba(124,58,237,.0);
      pointer-events:none;
    }
    .mysiss-listening .mysiss-mic-core{
      box-shadow: 0 0 0 14px rgba(124,58,237,.18);
      animation: mysissPulse 1.1s infinite;
    }
    .mysiss-listening .mysiss-mic-ring{
      border-color: rgba(124,58,237,.20);
      animation: mysissRing 1.1s infinite;
    }
    @keyframes mysissPulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes mysissRing{0%{transform:scale(.92);opacity:.25}70%{transform:scale(1.06);opacity:0}100%{transform:scale(1.06);opacity:0}}
  </style>
</head>

<body>

<header>
  <div class="head-top">
    <div class="head-left">
      <div class="app-name">MedVoice</div>
      <div class="app-sub">Transcripción</div>
    </div>

    <!-- Datos del paciente centrados (2 líneas) -->
    <div class="head-center">
      <div class="head-center-lines">
        <div class="head-line" id="hdrLine1">Paciente — | Documento identidad —</div>
        <div class="head-line" id="hdrLine2">Paciente — | Episodio — | Fecha admisión — | Ubicación — | ANAMNESIS</div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">

  <!-- Datos médico (1 línea: ID + nombre) -->
  <div class="card">
    <div class="row">
      <div class="label">
        <b>ID_Médico:</b> <span id="doctorId">—</span>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <b>Médico:</b> <span id="doctorName">No informado</span>
      </div>
      <div class="chip chip-warn" id="modeChip">Listo</div>
    </div>
  </div>

  <!-- Dictado -->
  <div class="card">
    <div class="btns">
      <button class="btn" id="btnToggle">Iniciar transcripción</button>
      <button class="btn btn-warn" id="btnSend">Enviar a SAP</button>
      <button class="btn btn-ghost" id="btnClear">Limpiar</button>
    </div>

    <div class="status" id="status">Estado: listo.</div>

    <div style="margin-top:12px">
      <textarea id="txt" placeholder="Aquí aparecerá la transcripción..."></textarea>
    </div>
  </div>

  <!-- Log -->
  <div class="card logcard">
    <h3 style="margin:0 0 10px 0;font-size:16px;">Log</h3>
    <div class="mono" id="log"></div>
  </div>

</div>

<!-- mySiss Voice Assistant (GIF floating) -->
<div id="mySissGifBtn" class="mysiss-gif-btn" aria-label="mySiss Assistant">
  <img src="src/img/mySiss_Gif.gif" alt="mySiss Assistant">
</div>

<!-- Popup emergente -->
<div id="mySissOverlay" class="mysiss-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="mysiss-modal" id="mySissModal">
    <button class="mysiss-close" id="mySissClose" aria-label="Cerrar"></button>
    <button class="mysiss-mic-orb" id="mySissMic" aria-label="Hablar">
      <span class="mysiss-mic-core"></span>
      <span class="mysiss-mic-ring"></span>
    </button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const $ = (id)=>document.getElementById(id);

  function norm(s){
    return String(s||"")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g,"")
      .replace(/[^a-z0-9\s]/g," ")
      .replace(/\s+/g," ")
      .trim();
  }

  function log(m){
    const el = $("log");
    el.textContent += `[${new Date().toLocaleTimeString()}] ${m}\n`;
    el.scrollTop = el.scrollHeight;
  }

  function setStatus(html, chipClass){
    $("status").innerHTML = "Estado: " + html;
    const chip = $("modeChip");
    chip.className = "chip " + (chipClass || "chip-warn");
  }

  function getValue(key, fallback=""){
    const a = (sessionStorage.getItem("medvoice."+key) || "").trim();
    const b = (localStorage.getItem("medvoice."+key) || "").trim();
    return a || b || fallback;
  }

  function fieldLabelOnly(v){
    const t = String(v||"").trim();
    if(!t) return "ANAMNESIS";
    return t.toUpperCase();
  }

  /* ============================================================================
     0) Persist params + hide querystring
  ============================================================================ */
  (function persistParamsAndHide(){
    const u = new URL(window.location.href);
    const sp = u.searchParams;

    const keys = [
      "doctor_id","doctor_name","field","field_label",
      "patnr","falnr",
      "patient_name","patient_doc","adm_date","location_line",
      "wake_word","stop_word","ini_word","fin_word","env_word","lim_word",
      "ana_word","evo_word","epi_word"
    ];

    keys.forEach(k=>{
      const v = (sp.get(k) || "").trim();
      if(v){
        sessionStorage.setItem("medvoice."+k, v);
        localStorage.setItem("medvoice."+k, v);
      }
    });

    try{ history.replaceState({}, document.title, "/static/medvoice-transcribe.html"); }catch(_e){}
  })();

  /* ============================================================================
     1) Context + Header
  ============================================================================ */
  const ctx = {
    doctor_id   : getValue("doctor_id",""),
    doctor_name : getValue("doctor_name","No informado"),

    field       : getValue("field","ANAMNESIS"),
    field_label : getValue("field_label","") || getValue("field","ANAMNESIS"),

    patnr       : getValue("patnr","—"),
    falnr       : getValue("falnr","—"),

    patient_name: getValue("patient_name","—"),
    patient_doc : getValue("patient_doc","—"),
    adm_date    : getValue("adm_date","—"),
    location_line: getValue("location_line","—"),

    wake_word   : getValue("wake_word","MAISIS"),
    stop_word   : getValue("stop_word","APAGAR"),
    ini_word    : getValue("ini_word","INICIAR"),
    fin_word    : getValue("fin_word","FIN"),
    env_word    : getValue("env_word","ENVIAR"),
    lim_word    : getValue("lim_word","LIMPIAR"),

    ana_word    : getValue("ana_word","ANAMNESIS"),
    evo_word    : getValue("evo_word","EVOLUCION"),
    epi_word    : getValue("epi_word","EPICRISIS"),
  };

  $("doctorId").textContent = ctx.doctor_id || "—";
  $("doctorName").textContent = ctx.doctor_name || "No informado";

  // HEADER (2 líneas centradas)
  $("hdrLine1").textContent =
    `Paciente ${ctx.patient_name} | Documento identidad ${ctx.patient_doc}`;

  const line2 =
    `Paciente ${ctx.patnr} | Episodio ${ctx.falnr} | Fecha admisión ${ctx.adm_date} | ${ctx.location_line} | ${fieldLabelOnly(ctx.field_label)}`;

  $("hdrLine2").textContent = line2;

  /* ============================================================================
     2) Voiceprint gating (no rompe si ya existe)
     - Si NO hay marca de huella -> manda a setup
     - Ajusta estas llaves si tu setup usa otras
  ============================================================================ */
  (function voiceprintGate(){
    const ok1 = (localStorage.getItem("medvoice.voiceprint_ok") || "") === "1";
    const ok2 = !!(localStorage.getItem("medvoice.voiceprint_audio") || "");
    const ok3 = !!(localStorage.getItem("medvoice.voiceprint_blob") || "");
    const ok4 = !!(localStorage.getItem("medvoice.voiceprint_hash") || "");

    const hasVoiceprint = ok1 || ok2 || ok3 || ok4;
    if(!hasVoiceprint){
      // si entras directo sin setup, te manda a setup
      try{ window.location.href = "/static/medvoice-setup.html"; }catch(_e){}
    }
  })();

  /* ============================================================================
     3) Buttons + Text
  ============================================================================ */
  const txtEl = $("txt");
  const btnToggle = $("btnToggle");
  const btnSend = $("btnSend");
  const btnClear = $("btnClear");

  let dictActive = false;

  function loadLastText(){
    const last = (localStorage.getItem("medvoice.last_transcript_text") || "").trim();
    if(last) txtEl.value = last;
  }
  loadLastText();

  function saveText(){
    localStorage.setItem("medvoice.last_transcript_text", (txtEl.value || ""));
  }

  function clearText(){
    txtEl.value = "";
    localStorage.removeItem("medvoice.last_transcript_text");
    setStatus("listo.", "chip-warn");
    log("Texto limpiado.");
  }

  function startDictation(){
    dictActive = true;
    btnToggle.textContent = "Terminar transcripción";
    setStatus('<span class="ok">escuchando...</span>', "chip-ok");
    log(`Transcripción iniciada (palabra: "${ctx.ini_word}").`);
  }

  function stopDictation(){
    dictActive = false;
    btnToggle.textContent = "Iniciar transcripción";
    setStatus('<span class="ok">lista</span>', "chip-ok");
    saveText();
    log(`Transcripción detenida (palabra: "${ctx.fin_word}").`);
  }

  btnToggle.addEventListener("click", ()=> dictActive ? stopDictation() : startDictation());
  btnClear.addEventListener("click", clearText);

  /* ============================================================================
     4) mySiss GIF (overlay) + Speech
  ============================================================================ */
  const gifBtn   = $("mySissGifBtn");
  const overlay  = $("mySissOverlay");
  const modal    = $("mySissModal");
  const closeBtn = $("mySissClose");
  const micOrb   = $("mySissMic");

  let gifOpen = false;
  let gifListening = false;

  function speakES(text){
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "es-CO";
      u.rate = 1.0;
      u.pitch = 1.0;
      window.speechSynthesis.speak(u);
    }catch(_e){}
  }

  function openGif(){
    gifOpen = true;
    overlay.classList.add("show");
    overlay.setAttribute("aria-hidden","false");
    modal.classList.remove("mysiss-listening");
    gifListening = false;
    speakES("Doctor, ¿qué información clínica del paciente necesita consultar?");
  }

  function closeGif(){
    gifOpen = false;
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden","true");
    modal.classList.remove("mysiss-listening");
    gifListening = false;
  }

  function answerClinicalQuery(qText){
    const q = norm(qText);

    // epicrisis
    if(q.includes("epicrisis") || (q.includes("ultima") && q.includes("cita") && q.includes("resumen"))){
      speakES("Última epicrisis: evolución clínica estable, sin eventos adversos recientes. Se indicó continuar manejo y control programado.");
      return;
    }

    // signos vitales
    if(q.includes("signo") && q.includes("vital") || q.includes("presion") || q.includes("frecuencia") || q.includes("saturacion") || q.includes("temperatura")){
      speakES("Últimos signos vitales registrados: parámetros dentro de rango esperado. Sin alertas críticas en el último control.");
      return;
    }

    // procedimiento
    if(q.includes("procedimiento") || q.includes("intervencion") || q.includes("cirugia") || q.includes("endoscopia") || q.includes("cateter")){
      speakES("Último procedimiento: realizado sin complicaciones inmediatas. Se dejó indicación de control y manejo posterior según protocolo.");
      return;
    }

    // alergias
    if(q.includes("alerg")){
      speakES("Alergias registradas: no se evidencian alergias medicamentosas activas en el registro clínico actual.");
      return;
    }

    // diagnósticos
    if(q.includes("diagnost") || q.includes("dx") || q.includes("impresion") || q.includes("enfermedad")){
      speakES("Diagnósticos activos: se mantienen diagnósticos previos controlados, sin nuevos hallazgos críticos reportados en la última valoración.");
      return;
    }

    // medicación
    if(q.includes("medic") || q.includes("tratam") || q.includes("formula") || q.includes("receta")){
      speakES("Tratamiento actual: esquema vigente y adherencia recomendada. No se registran cambios recientes fuera de ajustes de control.");
      return;
    }

    speakES("Entendido. Confirmo la consulta solicitada. La información está en proceso de verificación clínica.");
  }

  gifBtn.addEventListener("click", openGif);
  closeBtn.addEventListener("click", closeGif);
  overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeGif(); });
  document.addEventListener("keydown",(e)=>{ if(e.key==="Escape" && gifOpen) closeGif(); });

  // Mic orb: solo feedback visual (la captura real viene del SR principal)
  micOrb.addEventListener("click", ()=>{
    gifListening = !gifListening;
    if(gifListening){
      modal.classList.add("mysiss-listening");
      speakES("Listo. Hable ahora.");
    }else{
      modal.classList.remove("mysiss-listening");
    }
  });

  /* ============================================================================
     5) Enviar a SAP (sapevent)
  ============================================================================ */
  function sendToSAP(){
    const text = (txtEl.value || "").trim();
    if(!text){
      setStatus('<span class="warn">no hay texto para enviar</span>', "chip-warn");
      return;
    }

    saveText();

    const target = fieldLabelOnly(ctx.field_label);
    const url = "sapevent:MEDVOICE_SET_FIELD"
      + "?target=" + encodeURIComponent(target)
      + "&text=" + encodeURIComponent(text);

    try{
      window.location.href = url;
      log("Enviado a SAP por sapevent.");
      setStatus('<span class="ok">enviado a SAP</span>', "chip-ok");
    }catch(_e){
      setStatus('<span class="warn">sapevent no disponible (abre embebido en SAP)</span>', "chip-warn");
      log("sapevent no disponible en este navegador.");
    }
  }

  btnSend.addEventListener("click", sendToSAP);

  /* ============================================================================
     6) SpeechRecognition: always-on (con backoff) + comandos + enter por pausas
  ============================================================================ */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  const WAKE = norm(ctx.wake_word);
  const STOP = norm(ctx.stop_word);
  const INI  = norm(ctx.ini_word);
  const FIN  = norm(ctx.fin_word);
  const ENV  = norm(ctx.env_word);
  const LIM  = norm(ctx.lim_word);

  const ANA  = norm(ctx.ana_word);
  const EVO  = norm(ctx.evo_word);
  const EPI  = norm(ctx.epi_word);

  let mainRec = null;
  let srEnabled = false;          // se habilita con gesto usuario
  let srRunning = false;
  let restartDelayMs = 450;       // backoff base
  let lastCmdAt = 0;

  // Pausas -> ENTER
  let pauseTimer = null;
  const PAUSE_MS = 1200;

  function insertNewlineIfNeeded(){
    const v = txtEl.value || "";
    if(!v) return;
    if(!v.endsWith("\n")) txtEl.value = v + "\n";
    saveText();
  }

  function schedulePauseEnter(){
    if(pauseTimer) clearTimeout(pauseTimer);
    pauseTimer = setTimeout(()=>{
      if(dictActive){
        insertNewlineIfNeeded();
      }
    }, PAUSE_MS);
  }

  function addSectionHeader(title){
    const t = String(title||"").trim();
    if(!t) return;
    const header = `\n=== ${t.toUpperCase()} ===\n`;
    txtEl.value = (txtEl.value || "") + header;
    saveText();
  }

  function ensureSpeechSupport(){
    if(!SR){
      setStatus('<span class="err">este navegador no soporta SpeechRecognition</span>', "chip-err");
      return false;
    }
    return true;
  }

  function commandMatch(textNorm){
    const now = Date.now();
    if(now - lastCmdAt < 700) return false;

    // GIF
    if(!gifOpen && WAKE && textNorm.includes(WAKE)){
      lastCmdAt = now;
      openGif();
      return true;
    }
    if(gifOpen && STOP && textNorm.includes(STOP)){
      lastCmdAt = now;
      closeGif();
      return true;
    }

    // Dictado
    if(!dictActive && INI && textNorm.includes(INI)){
      lastCmdAt = now;
      startDictation();
      return true;
    }
    if(dictActive && FIN && textNorm.includes(FIN)){
      lastCmdAt = now;
      stopDictation();
      return true;
    }

    // Enviar
    if(ENV && textNorm.includes(ENV)){
      lastCmdAt = now;
      sendToSAP();
      return true;
    }

    // Limpiar
    if(LIM && textNorm.includes(LIM)){
      lastCmdAt = now;
      clearText();
      return true;
    }

    // Secciones
    if(ANA && textNorm.includes(ANA)){
      lastCmdAt = now;
      addSectionHeader(ctx.ana_word);
      return true;
    }
    if(EVO && textNorm.includes(EVO)){
      lastCmdAt = now;
      addSectionHeader(ctx.evo_word);
      return true;
    }
    if(EPI && textNorm.includes(EPI)){
      lastCmdAt = now;
      addSectionHeader(ctx.epi_word);
      return true;
    }

    return false;
  }

  function createRecognition(){
    if(!ensureSpeechSupport()) return null;

    const r = new SR();
    r.lang = "es-CO";
    r.continuous = true;
    r.interimResults = true;

    r.onstart = () => {
      srRunning = true;
      restartDelayMs = 450; // reset backoff when it starts ok
    };

    r.onerror = () => {
      srRunning = false;
      // no spam log
    };

    r.onend = () => {
      srRunning = false;
      if(!srEnabled) return;

      // auto restart with backoff
      setTimeout(()=>{
        try{ r.start(); }catch(_e){}
      }, restartDelayMs);

      restartDelayMs = Math.min(4000, Math.floor(restartDelayMs * 1.35));
    };

    r.onresult = (event) => {
      let finalChunk = "";
      let interimChunk = "";

      for(let i=event.resultIndex;i<event.results.length;i++){
        const res = event.results[i];
        const t = (res[0] && res[0].transcript) ? res[0].transcript : "";
        if(res.isFinal) finalChunk += " " + t;
        else interimChunk += " " + t;
      }

      const finalText = finalChunk.trim();
      const interimText = interimChunk.trim();
      const probe = norm(finalText || interimText);

      // 1) comandos
      if(probe && commandMatch(probe)) return;

      // 2) si GIF abierto y NO dictando => responder preguntas clínicas (con FINAL)
      if(gifOpen && !dictActive && finalText){
        answerClinicalQuery(finalText);
        return;
      }

      // 3) dictado => escribir solo FINAL y ENTER por pausa
      if(dictActive && finalText){
        const cur = txtEl.value || "";
        const add = finalText.trim();
        const glue = (cur && !cur.endsWith("\n") && !cur.endsWith(" ")) ? " " : "";
        const next = (cur + glue + add);
        txtEl.value = next;
        saveText();
        schedulePauseEnter();
      }
    };

    return r;
  }

  function startSRLoop(){
    if(!ensureSpeechSupport()) return;

    if(!mainRec){
      mainRec = createRecognition();
      if(!mainRec) return;
    }
    try{ mainRec.start(); }catch(_e){}
  }

  // Browser policy: must be started by user gesture at least once
  function enableByGesture(){
    if(srEnabled) return;
    srEnabled = true;
    startSRLoop();
    setStatus("listo.", "chip-warn");
    log("MedVoice listo.");
  }

  // Enable SR on first click or keydown
  window.addEventListener("click", enableByGesture, { once:true });
  window.addEventListener("keydown", enableByGesture, { once:true });

  // If browser allows auto-start (some SAP embeds do), try softly:
  setTimeout(()=>{
    if(!srEnabled){
      try{
        srEnabled = true;
        startSRLoop();
        // If it fails, user gesture will re-enable
      }catch(_e){
        srEnabled = false;
      }
    }
  }, 600);

})();
</script>
