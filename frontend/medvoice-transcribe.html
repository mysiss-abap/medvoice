<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Dictado</title>
  <style>
    :root{--sap-blue:#0a6ed1;--sap-blue-2:#0854a0;--bg:#f7f7f7;--card:#fff;--text:#1d2d3e;--muted:#6a6d70;--border:#d9d9d9;--ok:#107e3e;--warn:#e9730c;--err:#bb0000}
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{margin:0;background:var(--bg);color:var(--text)}
    header{background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));color:#fff;padding:14px 16px}
    .head-row{display:grid;grid-template-columns:1fr 1.7fr 1fr;align-items:center;gap:12px}
    .app-name{font-size:24px;font-weight:800;line-height:1}
    .app-sub{margin-top:4px;font-size:14px;opacity:.94}
    .patient-line{justify-self:center;font-size:14px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .wrap{max-width:1100px;margin:18px auto;padding:0 14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.06)}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .label{color:var(--muted);font-size:14px}
    .chip{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;border:1px solid #f5c6cb;background:#fde8ea;color:#a94442}
    .okchip{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;border:1px solid #cfe9d7;background:#eaf7ef;color:var(--ok)}
    .panel{border:1px solid var(--border);border-radius:14px;padding:16px;background:#fff;margin-top:14px}
    .panel h2{margin:0 0 10px;font-size:18px}
    .panel p{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.35}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
    button{border:0;cursor:pointer;padding:10px 18px;border-radius:10px;font-weight:800;font-size:14px}
    .btn-primary{background:var(--sap-blue);color:#fff}
    .btn-secondary{background:#d3e7fb;color:#0b3c74}
    .btn-tertiary{background:#ececec;color:#37474f}
    .status{margin-top:8px;font-size:13px;color:var(--muted)}
    .ok{color:var(--ok);font-weight:900}.err{color:var(--err);font-weight:900}
    .logwrap{margin-top:14px}.logtitle{font-size:16px;font-weight:900;margin:0 0 8px}
    .logbox{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff;height:220px;overflow:auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;white-space:pre-wrap}
    @media (max-width:900px){.head-row{grid-template-columns:1fr}.patient-line{text-align:left;justify-self:start}}
  </style>
</head>
<body>
<header>
  <div class="head-row">
    <div>
      <div class="app-name">MedVoice</div>
      <div class="app-sub">Transcripción</div>
    </div>
    <div class="patient-line" id="patientLine">Paciente por confirmar | Episodio por confirmar | Campo: por confirmar</div>
    <div></div>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <div class="row">
      <div class="label"><b>Médico:</b> <span id="doctorView">No informado</span> &nbsp; | &nbsp; <b>Campo:</b> <span id="fieldView">por confirmar</span></div>
      <div id="doctorChip" class="chip">Falta identificar médico</div>
    </div>
    <!-- FUTURO: insertar nombre completo del paciente y demografía desde SAP -->
    <!-- <div id="patientFullInfo"></div> -->
  </div>

  <div class="panel">
    <h2>Dictado clínico</h2>
    <p>Puede iniciar con el botón o diciendo la palabra de activación.</p>
    <div class="btns">
      <button id="btnToggle" class="btn-primary">Iniciar transcripción</button>
      <button id="btnSend" class="btn-secondary">Enviar a SAP</button>
      <button id="btnClear" class="btn-tertiary">Limpiar</button>
    </div>
    <div class="status">Estado: <span id="st">listo.</span></div>
  </div>

  <div class="logwrap">
    <div class="logtitle">Seguimiento</div>
    <div id="logBox" class="logbox"></div>
  </div>
</div>

<script>
(function(){ history.replaceState({}, document.title, "/static/medvoice-transcribe.html"); })();

function getValue(k, fallback=""){
  return (sessionStorage.getItem("medvoice." + k) || localStorage.getItem("medvoice." + k) || fallback).trim();
}

function normalizeText(v){
  return String(v || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

const ctx = {
  doctor_id: getValue("doctor_id"),
  api: getValue("api", window.location.origin),
  field: getValue("field", "por confirmar"),
  patnr: getValue("patnr", "por confirmar"),
  falnr: getValue("falnr", "por confirmar"),
  wake_word: getValue("wake_word", "mysiss"),
  // Placeholder SAP opcional:
  // localStorage.setItem("medvoice.wake_alias", "maisis");
  wake_alias: getValue("wake_alias", ""),
  stop_word: getValue("stop_word", "Apagar")
};

const patientLine = document.getElementById("patientLine");
patientLine.textContent = `Paciente ${ctx.patnr} | Episodio ${ctx.falnr} | Campo: ${ctx.field}`;
document.getElementById("doctorView").textContent = ctx.doctor_id || "No informado";
document.getElementById("fieldView").textContent = ctx.field || "por confirmar";
const doctorChip = document.getElementById("doctorChip");
if (ctx.doctor_id) {
  doctorChip.textContent = "Médico identificado";
  doctorChip.className = "okchip";
}

// FUTURO SAP: completar bloque de datos extendidos del paciente aquí.
// const patientFullInfo = document.getElementById("patientFullInfo");
// patientFullInfo.textContent = `${sapData.patientName} | ${sapData.birthDate} | ${sapData.gender}`;

const st = document.getElementById("st");
const logBox = document.getElementById("logBox");
const btnToggle = document.getElementById("btnToggle");
const btnSend = document.getElementById("btnSend");
const btnClear = document.getElementById("btnClear");

function log(m){
  const ts = new Date().toLocaleTimeString();
  logBox.textContent += `[${ts}] ${m}\n`;
  logBox.scrollTop = logBox.scrollHeight;
}

function micBlockedMessage(){
  st.innerHTML = '<span class="err">No fue posible usar el micrófono. Revise permisos del navegador.</span>';
  log("No se pudo activar el micrófono. Revise permisos del navegador en Chrome.");
}

// Nota dev: en producción, usar HTTPS para permisos de audio más consistentes.
let commandRecognition = null;
let commandLoopEnabled = false;
let dictationRecorder = null;
let dictationStream = null;
let dictationChunks = [];
let dictationActive = false;
let lastCommandAt = 0;

const normalizedWake = normalizeText(ctx.wake_word);
const normalizedWakeAlias = normalizeText(ctx.wake_alias);
const normalizedStop = normalizeText(ctx.stop_word || "apagar");

function stopStream(stream){ try{ stream && stream.getTracks().forEach(t=>t.stop()); }catch(_e){} }

function processCommandPhrase(fragment){
  const text = normalizeText(fragment);
  if (!text) return;
  const now = Date.now();
  if (now - lastCommandAt < 1300) return;

  const wakeDetected = (!!normalizedWake && text.includes(normalizedWake)) || (!!normalizedWakeAlias && text.includes(normalizedWakeAlias));
  const stopDetected = !!normalizedStop && text.includes(normalizedStop);

  if (!dictationActive && wakeDetected) {
    lastCommandAt = now;
    log(`Activación detectada: ${ctx.wake_word}${ctx.wake_alias ? " / " + ctx.wake_alias : ""}`);
    toggleDictationFromEvent(true);
    return;
  }

  if (dictationActive && stopDetected) {
    lastCommandAt = now;
    log(`Comando de cierre detectado: ${ctx.stop_word}`);
    toggleDictationFromEvent(false);
  }
}

function setupCommandRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    log("Detección por voz no disponible en este navegador.");
    return null;
  }
  const recognition = new SR();
  recognition.lang = "es-ES";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (event)=>{
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const phrase = (event.results[i][0] && event.results[i][0].transcript) || "";
      processCommandPhrase(phrase);
    }
  };

  recognition.onerror = ()=>{
    if (commandLoopEnabled) {
      log("Escucha por voz reiniciando automáticamente.");
    }
  };

  recognition.onend = ()=>{
    if (commandLoopEnabled) {
      try { recognition.start(); } catch(_e) {}
    }
  };
  return recognition;
}

async function toggleDictationFromEvent(shouldStart){
  if (shouldStart) return startDictation();
  return stopDictation();
}

async function startDictation(){
  if (dictationActive) return;
  try{
    dictationStream = await navigator.mediaDevices.getUserMedia({audio:true});
    dictationChunks = [];
    dictationRecorder = new MediaRecorder(dictationStream);
    dictationRecorder.ondataavailable = (e)=>{ if (e.data && e.data.size) dictationChunks.push(e.data); };
    dictationRecorder.onstop = async ()=>{
      stopStream(dictationStream);
      dictationRecorder = null;
      dictationActive = false;
      btnToggle.textContent = "Iniciar transcripción";
      localStorage.setItem("medvoice.dictation_state", "idle");
      const audioBlob = new Blob(dictationChunks, {type:"audio/webm"});
      await sendToTranscribe(audioBlob);
      st.innerHTML = '<span class="ok">listo para una nueva transcripción.</span>';
    };
    dictationRecorder.start();
    dictationActive = true;
    btnToggle.textContent = "Terminar transcripción";
    st.innerHTML = '<span class="ok">escuchando dictado.</span>';
    localStorage.setItem("medvoice.dictation_state", "recording");
    log("Transcripción iniciada.");
  }catch(_e){ micBlockedMessage(); }
}

async function stopDictation(){
  if (!dictationActive || !dictationRecorder) return;
  st.textContent = "procesando dictado…";
  localStorage.setItem("medvoice.dictation_state", "processing");
  log("Finalizando transcripción.");
  try{ dictationRecorder.stop(); }catch(_e){}
}

async function sendToTranscribe(blob){
  st.textContent = "preparando transcripción…";
  log("Enviando audio para transcripción.");
  const endpoint = ctx.api.replace(/\/$/, "") + "/api/transcribe";
  const fd = new FormData();
  fd.append("doctor_id", ctx.doctor_id || "");
  fd.append("target_field", ctx.field || "");
  fd.append("audio", blob, "dictado.webm");

  try{
    const res = await fetch(endpoint, {method:"POST", body:fd});
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const text = (data && data.text || "").trim();
    localStorage.setItem("medvoice.last_transcript_text", text);
    localStorage.setItem("medvoice.last_transcript_payload", JSON.stringify(data || {}));
    window.MEDVOICE_TRANSCRIPT = text;
    log(text ? "Transcripción lista para revisión y envío." : "Se recibió respuesta sin contenido de texto.");
  }catch(err){
    st.innerHTML = '<span class="err">No fue posible completar la transcripción.</span>';
    log("Error al enviar o recibir la transcripción: " + (err.message || String(err)));
  }
}

async function pushResult(text){
  const endpoint = ctx.api.replace(/\/$/, "") + "/api/push_result";
  try{
    const payload = {
      doctor_id: ctx.doctor_id || "",
      patnr: ctx.patnr || "",
      falnr: ctx.falnr || "",
      field: ctx.field || "",
      text: text || ""
    };
    const res = await fetch(endpoint, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    log("Resultado enviado a SAP correctamente.");

    // Fallback SAP GUI HTML Viewer (sapevent): habilitar solo si el canal HTTP no aplica.
    // window.location.href = "sapevent:MEDVOICE_DONE?text=" + encodeURIComponent(text || "");
  }catch(_e){
    log("No fue posible entregar el resultado por canal principal.");
  }
}

btnToggle.addEventListener("click", async ()=>{
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    micBlockedMessage();
    return;
  }
  if (dictationActive) {
    await toggleDictationFromEvent(false);
  } else {
    await toggleDictationFromEvent(true);
  }
});

btnSend.addEventListener("click", async ()=>{
  const text = (window.MEDVOICE_TRANSCRIPT || localStorage.getItem("medvoice.last_transcript_text") || "").trim();
  if (!text) {
    st.textContent = "no hay transcripción para enviar.";
    log("No hay transcripción disponible para envío.");
    return;
  }
  st.textContent = "enviando a SAP…";
  await pushResult(text);
  st.innerHTML = '<span class="ok">resultado enviado.</span>';
});

btnClear.addEventListener("click", ()=>{
  window.MEDVOICE_TRANSCRIPT = "";
  localStorage.removeItem("medvoice.last_transcript_text");
  localStorage.removeItem("medvoice.last_transcript_payload");
  st.textContent = "listo.";
  log("Se limpió la última transcripción guardada.");
});

async function initCommandLoop(){
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    micBlockedMessage();
    return;
  }
  try{
    const test = await navigator.mediaDevices.getUserMedia({audio:true});
    stopStream(test);
  }catch(_e){
    micBlockedMessage();
    return;
  }
  commandRecognition = commandRecognition || setupCommandRecognition();
  if (!commandRecognition) return;
  commandLoopEnabled = true;
  try { commandRecognition.start(); } catch(_e) {}
  log(`Comandos por voz activos. Activación: "${ctx.wake_word}"${ctx.wake_alias ? ` / alias "${ctx.wake_alias}"` : ""}. Detener: "${ctx.stop_word}".`);
}

window.MEDVOICE_TRANSCRIPT = localStorage.getItem("medvoice.last_transcript_text") || "";
initCommandLoop();
log("Dictado listo para iniciar.");
</script>
</body>
</html>
