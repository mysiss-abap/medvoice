<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice | Transcripción</title>
  <style>
    :root{
      --sap-blue:#0a6ed1; --sap-blue-2:#0854a0; --sap-bg:#f7f7f7; --sap-card:#fff;
      --sap-text:#1d2d3e; --sap-muted:#6a6d70; --sap-border:#d9d9d9;
      --ok:#107e3e; --warn:#e9730c; --err:#bb0000;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      background:var(--sap-bg);
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--sap-text);
      overflow:hidden;
    }

    header{
      background:linear-gradient(90deg,var(--sap-blue),var(--sap-blue-2));
      color:#fff;
      padding:10px 0;
    }
    .head-inner{ max-width:980px;margin:0 auto;padding:0 14px; }
    .head-grid{
      display:grid;
      grid-template-columns:200px 1fr 40px;
      align-items:start;
      gap:8px;
    }
    .brand .app-name{font-size:20px;font-weight:800;line-height:1}
    .brand .app-sub{font-size:12px;opacity:.9;margin-top:3px;font-weight:600}

    .patient-center{
      display:flex;flex-direction:column;gap:4px;
      align-items:center;text-align:center;min-width:0;
    }
    .patient-line{
      font-size:12.5px;font-weight:800;opacity:.97;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
    }

    .wrap{
      max-width:980px;
      margin:14px auto;
      padding:0 14px;
      height:calc(100vh - 70px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .card{
      background:var(--sap-card);
      border:1px solid var(--sap-border);
      border-radius:12px;
      box-shadow:0 1px 3px rgba(0,0,0,.05);
      padding:14px 16px;
    }

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
    .label{font-size:13px;color:var(--sap-muted)}
    .label b{color:var(--sap-text)}

    .chip{
      display:inline-block;padding:5px 10px;border-radius:999px;
      font-size:11px;font-weight:900;border:1px solid var(--sap-border);
      background:#eef2f7;color:var(--sap-muted);
    }
    .chip-ok{background:#e7f4ec;color:var(--ok)}
    .chip-warn{background:#fff3e0;color:var(--warn)}
    .chip-err{background:#fde8ea;color:var(--err)}

    .btns{display:flex;gap:8px;flex-wrap:wrap;}
    .btn{
      border:1px solid var(--sap-blue);background:var(--sap-blue);color:#fff;
      border-radius:9px;padding:9px 14px;font-size:13px;
      cursor:pointer;transition:.15s;user-select:none;font-weight:900;
    }
    .btn:hover{filter:brightness(.95);}
    .btn:disabled{opacity:.55;cursor:not-allowed;}
    .btn-ghost{background:#fff;color:var(--sap-blue);border-color:var(--sap-blue);}
    .btn-warn{background:var(--warn);border-color:var(--warn);}

    .status{margin-top:8px;font-size:12px;color:var(--sap-muted);}
    .ok{color:var(--ok);font-weight:900}
    .warn{color:var(--warn);font-weight:900}
    .err{color:var(--err);font-weight:900}

    textarea{
      border:1px solid var(--sap-border);border-radius:9px;
      padding:10px;font-size:13.5px;outline:none;background:#fff;
      width:100%;height:200px;
      resize:none;line-height:1.5;
      overflow:auto;white-space:pre-wrap;
      margin-top:10px;
    }
    textarea:focus{border-color:var(--sap-blue);}

    .logcard{flex:1;min-height:0;display:flex;flex-direction:column;}
    #logEl{
      flex:1;min-height:0;
      border:1px solid var(--sap-border);border-radius:10px;
      padding:10px;background:#fff;overflow:auto;
      font-family:Consolas,ui-monospace,Menlo,monospace;
      font-size:11.5px;white-space:pre-wrap;line-height:1.4;
    }

    /* mySiss floating GIF button (kept) */
    .mysiss-gif-btn{
      position:fixed;right:18px;bottom:18px;
      width:82px;height:82px;border-radius:24px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 14px 50px rgba(0,0,0,.5);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;user-select:none;z-index:9999;
      backdrop-filter:blur(10px);transition:transform .12s;
    }
    .mysiss-gif-btn:active{transform:scale(.97);}
    .mysiss-gif-btn img{width:68px;height:68px;object-fit:contain;border-radius:18px;display:block;}

    .mysiss-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.55);
      display:none;align-items:flex-end;justify-content:flex-end;
      padding:18px;z-index:9998;
    }
    .mysiss-overlay.show{display:flex;}

    .mysiss-modal{
      width:min(420px,100%);height:min(240px,60vh);
      border-radius:22px;
      background:rgba(12,16,28,.55);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 18px 60px rgba(0,0,0,.55);
      backdrop-filter:blur(14px);
      display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    .mysiss-close{
      position:absolute;top:12px;right:12px;
      width:38px;height:38px;border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);cursor:pointer;
    }
    .mysiss-close::before,.mysiss-close::after{
      content:"";position:absolute;top:50%;left:50%;
      width:16px;height:2px;background:rgba(255,255,255,.8);transform-origin:center;
    }
    .mysiss-close::before{transform:translate(-50%,-50%) rotate(45deg);}
    .mysiss-close::after{transform:translate(-50%,-50%) rotate(-45deg);}

    .mysiss-mic-orb{
      width:110px;height:110px;border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      cursor:pointer;position:relative;
      display:grid;place-items:center;overflow:hidden;
    }
    .mysiss-mic-core{
      width:22px;height:22px;border-radius:999px;
      background:rgba(124,58,237,.9);
      box-shadow:0 0 0 10px rgba(124,58,237,.14);
    }
    .mysiss-mic-ring{
      position:absolute;inset:-30px;border-radius:999px;
      border:2px solid rgba(124,58,237,.0);pointer-events:none;
    }
    .mysiss-listening .mysiss-mic-core{
      box-shadow:0 0 0 14px rgba(124,58,237,.18);
      animation:mysissPulse 1.1s infinite;
    }
    .mysiss-listening .mysiss-mic-ring{
      border-color:rgba(124,58,237,.2);
      animation:mysissRing 1.1s infinite;
    }
    @keyframes mysissPulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes mysissRing{0%{transform:scale(.92);opacity:.25}70%{transform:scale(1.06);opacity:0}100%{transform:scale(1.06);opacity:0}}
  </style>
</head>
<body>

<header>
  <div class="head-inner">
    <div class="head-grid">
      <div class="brand">
        <div class="app-name">MedVoice</div>
        <div class="app-sub">Transcripción</div>
      </div>
      <div class="patient-center">
        <div class="patient-line" id="hdrLine1">Paciente — | Doc. —</div>
        <div class="patient-line" id="hdrLine2">Episodio — | Fecha —</div>
      </div>
      <div></div>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="card">
    <div class="row">
      <div class="label">
        <b>ID_Médico:</b> <span id="doctorId">—</span>
        &nbsp;&nbsp;
        <b>Médico:</b> <span id="doctorName">—</span>
      </div>
      <div class="chip chip-warn" id="modeChip">Listo</div>
    </div>
  </div>

  <div class="card">
    <div class="btns">
      <button class="btn" id="btnToggle">Iniciar transcripción</button>
      <button class="btn btn-warn" id="btnSend">Enviar a SAP</button>
      <button class="btn btn-ghost" id="btnClear">Limpiar</button>
    </div>
    <div class="status" id="statusEl">Estado: listo.</div>
    <textarea id="txt" placeholder="Aquí aparecerá la transcripción…"></textarea>
  </div>

  <div class="card logcard">
    <div style="font-size:12px;font-weight:900;color:var(--sap-muted);margin-bottom:6px;">Log</div>
    <div id="logEl"></div>
  </div>

</div>

<!-- mySiss GIF -->
<div id="mySissGifBtn" class="mysiss-gif-btn" aria-label="mySiss Assistant">
  <img src="src/img/mySiss_Gif.gif" alt="mySiss">
</div>

<div id="mySissOverlay" class="mysiss-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="mysiss-modal" id="mySissModal">
    <button class="mysiss-close" id="mySissClose" aria-label="Cerrar"></button>
    <button class="mysiss-mic-orb" id="mySissMic" aria-label="Hablar">
      <span class="mysiss-mic-core"></span>
      <span class="mysiss-mic-ring"></span>
    </button>
  </div>
</div>

<script>
(()=>{"use strict";

/* ===================== helpers ===================== */
const $  = (id)=>document.getElementById(id);
const sv = (k,v)=>{ try{ localStorage.setItem("medvoice."+k, String(v)); }catch(_e){} };
const ss = (k,v)=>{ try{ sessionStorage.setItem("medvoice."+k, String(v)); }catch(_e){} };
const gv = (k,fb="")=>{
  const a=(sessionStorage.getItem("medvoice."+k)||"").trim();
  const b=(localStorage.getItem("medvoice."+k)||"").trim();
  return a||b||fb;
};
const gvAny = (keys, fb="")=>{
  for(const k of keys){
    const v=gv(k,"");
    if(v) return v;
  }
  return fb;
};
function norm(s){
  return String(s||"")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g," ")
    .replace(/\s+/g," ")
    .trim();
}
function setStatus(html, chipCls){
  $("statusEl").innerHTML="Estado: "+html;
  $("modeChip").className="chip "+(chipCls||"chip-warn");
}
function log(m){
  const el=$("logEl");
  el.textContent += `[${new Date().toLocaleTimeString()}] ${m}\n`;
  el.scrollTop = el.scrollHeight;
}

/* ===================== 0) persist all QS params ===================== */
(()=>{
  const sp = new URL(window.location.href).searchParams;
  sp.forEach((value,key)=>{
    const v=(value||"").trim();
    if(!v) return;
    ss(key,v); sv(key,v);
  });
  try{ history.replaceState({},document.title,"/static/medvoice-transcribe.html"); }catch(_e){}
})();

/* ===================== 1) context (IV_* + legacy) ===================== */
const ctx = {
  doctor_id    : gvAny(["doctor_id","IV_DOCTOR_ID"], ""),
  doctor_name  : gvAny(["doctor_name","IV_DOCTOR_NAME"], "No informado"),
  field        : gvAny(["field","IV_FIELD"], "ANAMNESIS"),
  field_label  : gvAny(["IV_FIELD_LABEL","field_label","field","IV_FIELD"], "ANAMNESIS"),
  patnr        : gvAny(["patnr","IV_PATNR"], "—"),
  falnr        : gvAny(["falnr","IV_FALNR"], "—"),
  patient_name : gvAny(["patient_name","IV_PATIENT_NAME"], "—"),
  patient_doc  : gvAny(["patient_doc","IV_PATIENT_DOC"], "—"),
  adm_date     : gvAny(["adm_date","IV_ADM_DATE"], "—"),
  location_line: gvAny(["IV_LOCATION_LINE","location_line"], "—"),
  session_id   : gvAny(["session_id","IV_SESSION_ID"], "") || ("sess_"+Date.now()),

  wake_word : gvAny(["IV_WAKE","wake_word"], "HOLA"),
  stop_word : gvAny(["IV_STOP","stop_word"], "CHAO"),
  ini_word  : gvAny(["IV_INI","ini_word"], "INICIAR"),
  fin_word  : gvAny(["IV_FIN","fin_word"], "FIN"),
  env_word  : gvAny(["IV_ENV","env_word"], "ENVIAR"),
  lim_word  : gvAny(["IV_LIM","lim_word"], "LIMPIAR"),

  // sections titles from SAP
  ana_word  : gvAny(["IV_ANA","ana_word"], "Enfermedad actual"),
  evo_word  : gvAny(["IV_EVO","evo_word"], "Examen fisico"),
  epi_word  : gvAny(["IV_EPI","epi_word"], "EPICRISIS"),

  // pause keyword
  pau_word  : gvAny(["IV_PAU","pau_word"], "PAUSAR"),
};

const FL = (v)=>(String(v||"").trim()||"ANAMNESIS").toUpperCase();
$("doctorId").textContent   = ctx.doctor_id || "—";
$("doctorName").textContent = ctx.doctor_name;
$("hdrLine1").textContent   = `Paciente ${ctx.patient_name} | Documento ${ctx.patient_doc}`;
$("hdrLine2").textContent   = `${ctx.patnr} | Ep. ${ctx.falnr} | ${ctx.adm_date} | ${ctx.location_line} | ${FL(ctx.field_label)}`;

/* keywords normalized */
const KW = {
  WAKE:norm(ctx.wake_word),
  STOP:norm(ctx.stop_word),
  INI:norm(ctx.ini_word),
  FIN:norm(ctx.fin_word),
  ENV:norm(ctx.env_word),
  LIM:norm(ctx.lim_word),
  ANA:norm(ctx.ana_word),
  EVO:norm(ctx.evo_word),
  EPI:norm(ctx.epi_word),
  PAU:norm(ctx.pau_word),
  HOLA:"hola",
  CHAO:"chao",
};

/* ===================== 2) voiceprint gate (NO setup touched) ===================== */
(()=>{
  const ok =
    localStorage.getItem("medvoice.has_voiceprint") === "1" ||
    !!localStorage.getItem("medvoice.voiceprint_audio") ||
    !!localStorage.getItem("medvoice.voiceprint_blob") ||
    !!localStorage.getItem("medvoice.voiceprint_hash");

  if(!ok){
    log("Sin huella de voz. Redirigiendo a configuración…");
    try{ window.location.href="/static/medvoice-setup.html"; }catch(_e){}
  }
})();

/* ===================== 3) nlp clean ===================== */
function nlpClean(text){
  let t=(text||"").trim();
  t=t.replace(/\bpunto y coma\b/gi,";");
  t=t.replace(/\bdos puntos\b/gi,":");
  t=t.replace(/\bpunto aparte\b/gi,".\n");
  t=t.replace(/\bpunto seguido\b/gi,". ");
  t=t.replace(/\b(?:punto)\b/gi,".");
  t=t.replace(/\bcoma\b/gi,",");
  t=t.replace(/\bsigno de interrogaci[oó]n\b/gi,"?");
  t=t.replace(/\bsigno de exclamaci[oó]n\b/gi,"!");
  t=t.replace(/\b(este|eh|am|mm|hmm|uh)\b/gi,"");
  t=t.replace(/\b(\w+)\s+\1\b/gi,"$1");
  t=t.replace(/\s+([.,;:?!])/g,"$1");
  t=t.replace(/([.,;:?!])(?=[^\s])/g,"$1 ");
  t=t.replace(/[ \t]{2,}/g," ").trim();
  return t;
}

/* ===================== 4) dictation state ===================== */
const txtEl=$("txt");
const btnToggle=$("btnToggle");
const btnSend=$("btnSend");
const btnClear=$("btnClear");

let dictActive=false;      // started
let dictPaused=false;      // paused by PAUSAR
let suspendByGif=false;    // true while gif open
let pauseTimer=null;
const PAUSE_MS=1200;

const sections={anamnesis:"", evolucion:"", epicrisis:"", _current:"anamnesis"};

const lastTxt=(localStorage.getItem("medvoice.last_transcript_text")||"").trim();
if(lastTxt) txtEl.value=lastTxt;

function saveText(){ sv("last_transcript_text", txtEl.value||""); }
function schedulePauseEnter(){
  if(pauseTimer) clearTimeout(pauseTimer);
  pauseTimer=setTimeout(()=>{
    if(!dictActive || dictPaused || suspendByGif) return;
    const v=txtEl.value||"";
    if(v && !v.endsWith("\n")){ txtEl.value=v+"\n"; saveText(); }
  },PAUSE_MS);
}
function secKey(){ return sections._current || "anamnesis"; }

function addSectionHeader(title){
  const t=String(title||"").trim();
  if(!t) return;
  txtEl.value=(txtEl.value||"")+`\n=== ${t.toUpperCase()} ===\n`;

  const nt=norm(t);
  if(nt===KW.EPI || nt.includes(KW.EPI)) sections._current="epicrisis";
  else if(nt===KW.EVO || nt.includes(KW.EVO)) sections._current="evolucion";
  else sections._current="anamnesis";

  saveText();
  log("Sección: "+t.toUpperCase());
}

function appendDictation(raw){
  if(!dictActive || dictPaused || suspendByGif) return;
  const clean=nlpClean(raw);
  if(!clean) return;

  const cur=txtEl.value||"";
  const glue=(cur && !cur.endsWith("\n") && !cur.endsWith(" ")) ? " " : "";
  txtEl.value=cur+glue+clean;
  saveText();

  const k=secKey();
  sections[k]=(sections[k]+" "+clean).trim();

  schedulePauseEnter();
}

function startDictation(){
  dictActive=true;
  dictPaused=false;
  btnToggle.textContent="Terminar transcripción";
  setStatus('<span class="ok">escuchando…</span>',"chip-ok");
  log("Transcripción iniciada.");
}
function stopDictation(){
  dictActive=false;
  dictPaused=false;
  btnToggle.textContent="Iniciar transcripción";
  setStatus('<span class="ok">lista</span>',"chip-ok");
  if(pauseTimer){ clearTimeout(pauseTimer); pauseTimer=null; }
  saveText();
  log("Transcripción detenida.");
}
function pauseDictation(){
  if(!dictActive) return;
  dictPaused=true;
  setStatus('<span class="warn">pausado</span>',"chip-warn");
  log("Transcripción pausada.");
}
function resumeDictation(){
  if(!dictActive){ startDictation(); return; }
  dictPaused=false;
  setStatus('<span class="ok">escuchando…</span>',"chip-ok");
  log("Transcripción reanudada.");
}
function clearText(){
  txtEl.value="";
  localStorage.removeItem("medvoice.last_transcript_text");
  sections.anamnesis=""; sections.evolucion=""; sections.epicrisis=""; sections._current="anamnesis";
  setStatus("listo.","chip-warn");
  log("Texto limpiado.");
}

btnToggle.addEventListener("click",()=>{ enableSR(); dictActive ? stopDictation() : startDictation(); });
btnClear.addEventListener("click",()=>{ enableSR(); clearText(); });

/* ===================== 5) payload + send ===================== */
function buildPayload(){
  const full=(txtEl.value||"").trim();
  return {
    session_id: ctx.session_id,
    doctor_id: ctx.doctor_id,
    patnr: ctx.patnr,
    falnr: ctx.falnr,
    field_label: FL(ctx.field_label),
    location_line: ctx.location_line,
    timestamp: new Date().toISOString(),

    // from SAP, dynamic (no hardcoded)
    section_titles: {
      anamnesis: ctx.ana_word,
      evolucion: ctx.evo_word,
      epicrisis: ctx.epi_word
    },

    sections: {
      anamnesis: (sections.anamnesis||"").trim(),
      evolucion: (sections.evolucion||"").trim(),
      epicrisis: (sections.epicrisis||"").trim()
    },

    full_text: full
  };
}

function sendToSAP(){
  const text=(txtEl.value||"").trim();
  if(!text){
    setStatus('<span class="warn">sin texto para enviar</span>',"chip-warn");
    return;
  }

  const payload=buildPayload();

  // keep your previous flow
  localStorage.setItem("medvoice.pending_payload", JSON.stringify(payload));
  localStorage.setItem("medvoice.json.last", JSON.stringify(payload));

  // 1) optional backend save (as you had)
  (async()=>{
    try{
      const apiBase = (window.location.origin && window.location.origin !== "null")
        ? window.location.origin
        : "http://127.0.0.1:8000";
      const resp = await fetch(apiBase+"/api/save-json",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
      const data = await resp.json();
      if(data && data.ok) log("JSON guardado: "+(data.saved||[]).join(" | "));
      else log("AVISO JSON: "+JSON.stringify(data));
    }catch(err){
      log("Backend no disponible para guardar JSON: "+(err && err.message ? err.message : err));
    }
  })();

  // 2) SAP submit page (chunking)
  try{
    window.location.href="/static/medvoice-submit.html";
  }catch(_e){
    const target=FL(ctx.field_label);
    window.location.href="sapevent:MEDVOICE_SET_FIELD?target="+encodeURIComponent(target)+"&text="+encodeURIComponent(text);
  }
}

btnSend.addEventListener("click",()=>{ enableSR(); sendToSAP(); });

/* ===================== 6) GIF assistant (voice-driven) ===================== */
const gifBtn=$("mySissGifBtn");
const overlay=$("mySissOverlay");
const modal=$("mySissModal");
const closeBtn=$("mySissClose");
const micOrb=$("mySissMic");

let gifOpen=false;
let gifListening=false;
let lastCmdAt=0;

function unlockAudio(){
  try{
    if(localStorage.getItem("medvoice.audio_unlocked")==="1") return;
    const u=new SpeechSynthesisUtterance(".");
    u.lang="es-CO"; u.volume=0.01;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
    localStorage.setItem("medvoice.audio_unlocked","1");
  }catch(_e){}
}

function speakES(text){
  try{
    unlockAudio();
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(String(text||""));
    u.lang="es-CO"; u.rate=1.0; u.pitch=1.0;
    window.speechSynthesis.speak(u);
  }catch(_e){}
}

function openGif(fromVoice=true){
  gifOpen=true;
  overlay.classList.add("show");
  overlay.setAttribute("aria-hidden","false");
  modal.classList.remove("mysiss-listening");
  gifListening=false;

  // while gif open: block dictation (no transcribe)
  suspendByGif=true;
  setStatus('<span class="warn">asistente activo</span>',"chip-warn");
  if(fromVoice) speakES("Doctor, ¿qué información clínica del paciente necesita consultar?");
  log("Asistente abierto.");
}

function closeGif(fromVoice=true){
  gifOpen=false;
  overlay.classList.remove("show");
  overlay.setAttribute("aria-hidden","true");
  modal.classList.remove("mysiss-listening");
  gifListening=false;

  suspendByGif=false;
  setStatus(dictActive && !dictPaused ? '<span class="ok">escuchando…</span>' : "listo.", dictActive && !dictPaused ? "chip-ok" : "chip-warn");
  if(fromVoice) log("Asistente cerrado.");
}

function answerClinical(qText){
  const q=norm(qText);

  if(q.includes("epicrisis")||(q.includes("ultima")&&q.includes("cita"))){
    speakES("Última epicrisis: evolución favorable, sin signos de alarma. Se mantiene el plan y control según indicación clínica.");
    return;
  }
  if((q.includes("signo")&&q.includes("vital"))||q.includes("presion")||q.includes("saturacion")||q.includes("temperatura")||q.includes("frecuencia")){
    speakES("Últimos signos vitales: presión 118 sobre 76, frecuencia 72, saturación 97 por ciento, temperatura 36 punto 5.");
    return;
  }
  if(q.includes("alerg")){
    speakES("No se registran alergias medicamentosas conocidas en el registro activo.");
    return;
  }
  if(q.includes("medic")||q.includes("tratam")||q.includes("formula")){
    speakES("Medicación activa registrada. Indique si desea revisar dosis, horarios o cambios.");
    return;
  }
  speakES("Entendido. Indique qué dato necesita: epicrisis, signos vitales, diagnósticos, medicación o laboratorios.");
}

/* keep click as optional manual open, but voice is primary */
gifBtn.addEventListener("click",()=>{ enableSR(); unlockAudio(); openGif(false); });
closeBtn.addEventListener("click",()=>closeGif(false));
overlay.addEventListener("click",(e)=>{ if(e.target===overlay) closeGif(false); });
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape" && gifOpen) closeGif(false); });

micOrb.addEventListener("click",()=>{
  enableSR(); unlockAudio();
  gifListening=!gifListening;
  if(gifListening){
    modal.classList.add("mysiss-listening");
    speakES("Listo. Hable ahora.");
  }else{
    modal.classList.remove("mysiss-listening");
  }
});

/* ===================== 7) SpeechRecognition always-on ===================== */
const SR=window.SpeechRecognition || window.webkitSpeechRecognition;
let mainRec=null;
let srEnabled=false;
let backoffMs=400;
let restartTimer=null;

function isCommandPhrase(probe){
  // blocks these from being transcribed by consuming them as commands
  return (
    (KW.HOLA && probe.includes(KW.HOLA)) ||
    (KW.CHAO && probe.includes(KW.CHAO)) ||
    (KW.WAKE && probe.includes(KW.WAKE)) ||
    (KW.STOP && probe.includes(KW.STOP)) ||
    (KW.INI  && probe.includes(KW.INI )) ||
    (KW.FIN  && probe.includes(KW.FIN )) ||
    (KW.ENV  && probe.includes(KW.ENV )) ||
    (KW.LIM  && probe.includes(KW.LIM )) ||
    (KW.PAU  && probe.includes(KW.PAU )) ||
    (KW.ANA  && probe.includes(KW.ANA )) ||
    (KW.EVO  && probe.includes(KW.EVO )) ||
    (KW.EPI  && probe.includes(KW.EPI ))
  );
}

function handleCommands(probe){
  const now=Date.now();
  if(now-lastCmdAt<650) return true; // anti-spam
  // greetings (hard)
  if(!gifOpen && probe.includes(KW.HOLA)){
    lastCmdAt=now; openGif(true); return true;
  }
  if(gifOpen && probe.includes(KW.CHAO)){
    lastCmdAt=now;
    speakES("Hasta luego, doctor. Estoy disponible cuando me necesite.");
    setTimeout(()=>closeGif(true), 1200);
    return true;
  }

  // wake/stop from SAP
  if(!gifOpen && KW.WAKE && probe.includes(KW.WAKE)){
    lastCmdAt=now; openGif(true); return true;
  }
  if(gifOpen && KW.STOP && probe.includes(KW.STOP)){
    lastCmdAt=now;
    speakES("Hasta luego, doctor. Estoy disponible cuando me necesite.");
    setTimeout(()=>closeGif(true), 1200);
    return true;
  }

  // pause/resume/start/stop dictation
  if(dictActive && !dictPaused && KW.PAU && probe.includes(KW.PAU)){
    lastCmdAt=now; pauseDictation(); return true;
  }
  if(KW.INI && probe.includes(KW.INI)){
    lastCmdAt=now;
    if(gifOpen) return true; // do not start dictation while assistant open
    if(dictActive && dictPaused) resumeDictation();
    else if(!dictActive) startDictation();
    return true;
  }
  if(dictActive && KW.FIN && probe.includes(KW.FIN)){
    lastCmdAt=now; stopDictation(); return true;
  }

  // actions
  if(KW.ENV && probe.includes(KW.ENV)){
    lastCmdAt=now; sendToSAP(); return true;
  }
  if(KW.LIM && probe.includes(KW.LIM)){
    lastCmdAt=now; clearText(); return true;
  }

  // sections
  if(KW.ANA && probe.includes(KW.ANA)){
    lastCmdAt=now; addSectionHeader(ctx.ana_word); return true;
  }
  if(KW.EVO && probe.includes(KW.EVO)){
    lastCmdAt=now; addSectionHeader(ctx.evo_word); return true;
  }
  if(KW.EPI && probe.includes(KW.EPI)){
    lastCmdAt=now; addSectionHeader(ctx.epi_word); return true;
  }

  return false;
}

function createSR(){
  if(!SR) return null;
  const r=new SR();
  r.lang="es-CO";
  r.continuous=true;
  r.interimResults=true;

  r.onstart=()=>{
    backoffMs=400;
    // do NOT spam log on every restart
  };

  r.onerror=(e)=>{
    if(e.error==="not-allowed"||e.error==="service-not-allowed"){
      srEnabled=false;
      setStatus('<span class="err">permiso de micrófono denegado</span>',"chip-err");
      log("Permiso de micrófono denegado.");
    }
  };

  r.onend=()=>{
    scheduleRestart();
  };

  r.onresult=(event)=>{
    let finalChunk="", interimChunk="";
    for(let i=event.resultIndex;i<event.results.length;i++){
      const res=event.results[i];
      const t=(res[0]&&res[0].transcript)?res[0].transcript:"";
      if(res.isFinal) finalChunk+=" "+t;
      else interimChunk+=" "+t;
    }

    const finalText=finalChunk.trim();
    const interimText=interimChunk.trim();

    // faster command reaction: check interim first
    const probeInterim=norm(interimText);
    if(probeInterim && isCommandPhrase(probeInterim)){
      handleCommands(probeInterim);
      return; // consume commands so they are NOT transcribed
    }

    const probeFinal=norm(finalText);
    if(probeFinal && isCommandPhrase(probeFinal)){
      handleCommands(probeFinal);
      return; // consume
    }

    // if assistant open and not dictating -> answer from FINAL only
    if(gifOpen && !dictActive && finalText){
      answerClinical(finalText);
      return;
    }

    // dictation only if started and not paused and assistant not open
    if(dictActive && !dictPaused && !gifOpen && finalText){
      appendDictation(finalText);
    }
  };

  return r;
}

function scheduleRestart(){
  if(!srEnabled) return;
  if(restartTimer) clearTimeout(restartTimer);
  restartTimer=setTimeout(()=>{
    mainRec=createSR();
    if(!mainRec) return;
    try{ mainRec.start(); }catch(_e){}
    backoffMs=Math.min(5000, Math.floor(backoffMs*1.4));
  }, backoffMs);
}

function enableSR(){
  if(srEnabled) return;
  if(!SR){
    setStatus('<span class="err">SpeechRecognition no disponible</span>',"chip-err");
    log("SpeechRecognition no disponible.");
    return;
  }
  srEnabled=true;
  mainRec=createSR();
  if(!mainRec) return;
  try{ mainRec.start(); }catch(_e){ scheduleRestart(); }
}

/* IMPORTANT:
   Browser requires user gesture at least once.
   After first click/keydown, SR stays always-on via restart/backoff.
*/
document.addEventListener("click", ()=>{ unlockAudio(); enableSR(); }, { once:true });
document.addEventListener("keydown",()=>{ unlockAudio(); enableSR(); }, { once:true });

/* init */
setStatus("listo.","chip-warn");
log("MedVoice listo. Siempre escuchando (tras 1 gesto). No transcribe hasta INICIAR.");

})();
</script>
