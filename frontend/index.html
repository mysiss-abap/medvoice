<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice</title>
</head>
<body>
<script>
(function () {
  const url = new URL(window.location.href);
  const params = url.searchParams;

  const incoming = {};
  params.forEach((value, key) => {
    incoming[key] = (value || "").trim();
  });

  const aliases = {
    wake: "wake_word",
    stop: "stop_word"
  };

  Object.entries(aliases).forEach(([from, to]) => {
    if (!incoming[to] && incoming[from]) incoming[to] = incoming[from];
  });

  Object.entries(incoming).forEach(([k, v]) => {
    if (!v) return;
    sessionStorage.setItem("medvoice." + k, v);
    localStorage.setItem("medvoice." + k, v);
  });

  history.replaceState({}, document.title, "/static/index.html");

  const hasVoiceprint = localStorage.getItem("medvoice.has_voiceprint") === "1";
  const hasNoise = localStorage.getItem("medvoice.has_noise_profile") === "1" || !!localStorage.getItem("medvoice.noise_rms");
  const destination = (hasVoiceprint && hasNoise)
    ? "/static/medvoice-transcribe.html"
    : "/static/medvoice-setup.html";

  function loadFallbackContext(){
    try{
      const raw = localStorage.getItem("medvoice_ctx") || "";
      if (!raw) return null;
      const ctx = JSON.parse(raw);
      if (!ctx || typeof ctx !== "object") return null;
      window.__MEDVOICE_CTX = ctx;
      Object.entries(ctx).forEach(([k, v])=>{
        if (v === null || v === undefined) return;
        const txt = String(v).trim();
        if (!txt) return;
        sessionStorage.setItem("medvoice." + k, txt);
      });
      return ctx;
    }catch(_e){ return null; }
  }

  function nextRoute(){
    const hasVoiceprint = localStorage.getItem("medvoice.has_voiceprint") === "1";
    const hasNoise = localStorage.getItem("medvoice.has_noise_profile") === "1" || !!localStorage.getItem("medvoice.noise_rms");
    return (hasVoiceprint && hasNoise) ? "/static/medvoice-transcribe.html" : "/static/medvoice-setup.html";
  }

  (async ()=>{
    try{ await loadContext(); }catch(_e){ loadFallbackContext(); }
    window.location.replace(nextRoute());
  })();
})();
</script>
</body>
</html>
