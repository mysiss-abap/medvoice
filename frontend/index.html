<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice</title>
</head>
<body>
<script>
(function(){
  const url = new URL(window.location.href);
  const qs = url.searchParams;

  const setSS = (k,v)=>{ if(v) sessionStorage.setItem("medvoice."+k, v); };
  const setLS = (k,v)=>{ if(v) localStorage.setItem("medvoice."+k, v); };

  const doctor_id = (qs.get("doctor_id")||"").trim();
  const api       = (qs.get("api")||"").trim();
  const field     = (qs.get("field")||"").trim();
  const patnr     = (qs.get("patnr")||"").trim();
  const falnr     = (qs.get("falnr")||"").trim();
  const wake_word = (qs.get("wake_word")||qs.get("wake")||"").trim();

  // Persistir contexto (SAP -> UI)
  setSS("doctor_id", doctor_id); setLS("doctor_id", doctor_id);
  setSS("api", api);             setLS("api", api);
  setSS("field", field);         setLS("field", field);
  setSS("patnr", patnr);         setLS("patnr", patnr);
  setSS("falnr", falnr);         setLS("falnr", falnr);
  setSS("wake_word", wake_word); setLS("wake_word", wake_word);

  // Limpiar URL: dejar solo .../static/index.html (sin querystring)
  if (url.search) window.history.replaceState({}, document.title, url.pathname);

  // Router local (sin backend)
  const hasVoice = localStorage.getItem("medvoice.has_voiceprint") === "1";
  const base = url.pathname.replace(/index\.html$/i,"");
  const next = hasVoice ? "medvoice-transcribe.html" : "medvoice-setup.html";
  window.location.replace(base + next);
})();
</script>
</body>
</html>
