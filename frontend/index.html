<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice</title>
</head>
<body>
<script>
(function () {
  function pick(k){ return (new URL(window.location.href).searchParams.get(k) || "").trim(); }

  const sessionId = pick("session_id");
  const api = (pick("api") || localStorage.getItem("medvoice.api") || window.location.origin).replace(/\/+$/, "");

  if (sessionId) {
    sessionStorage.setItem("medvoice.session_id", sessionId);
    localStorage.setItem("medvoice.session_id", sessionId);
  }
  if (api) {
    sessionStorage.setItem("medvoice.api", api);
    localStorage.setItem("medvoice.api", api);
  }

  history.replaceState({}, document.title, "/static/index.html");

  async function loadContext(){
    const sid = sessionStorage.getItem("medvoice.session_id") || localStorage.getItem("medvoice.session_id") || "";
    if (!sid || !api) throw new Error("missing session/api");
    const res = await fetch(`${api}/api/context?session_id=${encodeURIComponent(sid)}`);
    if (!res.ok) throw new Error("context http " + res.status);
    const data = await res.json();
    if (!data || !data.ok || !data.context) throw new Error("invalid context payload");
    const ctx = data.context;
    window.__MEDVOICE_CTX = ctx;
    localStorage.setItem("medvoice_ctx", JSON.stringify(ctx));
    Object.entries(ctx).forEach(([k, v])=>{
      if (v === null || v === undefined) return;
      const txt = String(v).trim();
      if (!txt) return;
      sessionStorage.setItem("medvoice." + k, txt);
      localStorage.setItem("medvoice." + k, txt);
    });
    return ctx;
  }

  function loadFallbackContext(){
    try{
      const raw = localStorage.getItem("medvoice_ctx") || "";
      if (!raw) return null;
      const ctx = JSON.parse(raw);
      if (!ctx || typeof ctx !== "object") return null;
      window.__MEDVOICE_CTX = ctx;
      Object.entries(ctx).forEach(([k, v])=>{
        if (v === null || v === undefined) return;
        const txt = String(v).trim();
        if (!txt) return;
        sessionStorage.setItem("medvoice." + k, txt);
      });
      return ctx;
    }catch(_e){ return null; }
  }

  function nextRoute(){
    const hasVoiceprint = localStorage.getItem("medvoice.has_voiceprint") === "1";
    const hasNoise = localStorage.getItem("medvoice.has_noise_profile") === "1" || !!localStorage.getItem("medvoice.noise_rms");
    return (hasVoiceprint && hasNoise) ? "/static/medvoice-transcribe.html" : "/static/medvoice-setup.html";
  }

  (async ()=>{
    try{ await loadContext(); }catch(_e){ loadFallbackContext(); }
    window.location.replace(nextRoute());
  })();
})();
</script>
</body>
</html>
