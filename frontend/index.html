<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice</title>
</head>
<body>
<script>
(function () {
  const url = new URL(window.location.href);
  const params = url.searchParams;

  // Guardar TODOS los parámetros que llegan desde SAP
  params.forEach((value, key) => {
    const v = (value || "").trim();
    if(!v) return;
    sessionStorage.setItem("medvoice." + key, v);
    localStorage.setItem("medvoice." + key, v);
  });

  // Ocultar QS
  try{ history.replaceState({}, document.title, "/static/index.html"); }catch(_e){}

  // Ruta según huella + ambiente
  const hasVoiceprint = localStorage.getItem("medvoice.has_voiceprint") === "1";
  const hasNoise = localStorage.getItem("medvoice.has_noise_profile") === "1" || !!localStorage.getItem("medvoice.noise_rms");

  const destination = (hasVoiceprint && hasNoise)
    ? "/static/medvoice-transcribe.html"
    : "/static/medvoice-setup.html";

  /*
    Abrir con window.open para que window.close() funcione en el destino.
    Si ya es una ventana popup (opener existe), navegar directo.
    Si opener no existe, intentar abrir nueva ventana y cerrar esta.
  */
  if(window.opener){
    // Ya somos una ventana secundaria — navegar directo
    window.location.replace(destination);
  } else {
    // Primera apertura: abrir como popup y cerrar este tab
    var win = window.open(destination, "_blank",
      "width=1024,height=768,menubar=no,toolbar=no,location=no,status=no,scrollbars=yes,resizable=yes"
    );
    if(win){
      // Popup abierto — cerrar esta ventana/pestaña origen
      try{ window.close(); }catch(_e){}
      // Si window.close() no funcionó (SAP embed), redirigir de todas formas
      setTimeout(function(){ window.location.replace(destination); }, 300);
    } else {
      // Popup bloqueado — navegar directo
      window.location.replace(destination);
    }
  }
})();
</script>
</body>
</html>
