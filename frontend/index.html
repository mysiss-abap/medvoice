<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice</title>
</head>
<body>
<script>
(function () {
  const url = new URL(window.location.href);
  const pick = (k) => (url.searchParams.get(k) || "").trim();

  const context = {
    doctor_id: pick("doctor_id"),
    api: pick("api"),
    field: pick("field"),
    patnr: pick("patnr"),
    falnr: pick("falnr"),
    wake_word: pick("wake_word") || pick("wake") || "SAP"
  };

  Object.entries(context).forEach(([k, v]) => {
    if (v) {
      sessionStorage.setItem("medvoice." + k, v);
      localStorage.setItem("medvoice." + k, v);
    }
  });

  history.replaceState({}, document.title, "/static/index.html");

  const hasVoiceprint = localStorage.getItem("medvoice.has_voiceprint") === "1";
  const destination = hasVoiceprint
    ? "/static/medvoice-transcribe.html"
    : "/static/medvoice-setup.html";

  window.location.replace(destination);
})();
</script>
</body>
</html>
