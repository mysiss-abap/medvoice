<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedVoice</title>
</head>
<body>
<script>
(function () {
  const u = new URL(window.location.href);
  const qs = u.searchParams;

  const pick = (k) => (qs.get(k) || "").trim();

  // Contexto que llega desde SAP
  const ctx = {
    doctor_id: pick("doctor_id"),
    api:       pick("api"),
    field:     pick("field"),
    patnr:     pick("patnr"),
    falnr:     pick("falnr"),
    wake_word: pick("wake_word") || pick("wake") || "SAP"
  };

  // Persistencia (session + local) para que cualquier pantalla lo lea
  for (const [k, v] of Object.entries(ctx)) {
    if (v) {
      sessionStorage.setItem("medvoice." + k, v);
      localStorage.setItem("medvoice." + k, v);
    }
  }

  // LIMPIAR la barra: dejar SOLO .../static/index.html
  if (u.search) {
    history.replaceState({}, document.title, u.pathname);
  }

  // Router
  const hasVoice = localStorage.getItem("medvoice.has_voiceprint") === "1";
  const basePath = u.pathname.replace(/index\.html$/i, "");
  const next = hasVoice ? "medvoice-transcribe.html" : "medvoice-setup.html";
  window.location.replace(basePath + next);
})();
</script>
</body>
</html>
